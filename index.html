<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCore Terminal v3.0</title>
<style>
:root{--bg:#0a0a0a;--text:#e0e0e0;--accent:#3b82f6;--ai:#FF5F1F;--logo:#e0e0e0;--border:#1e1e1e;--win-bg:#0d0d0d;--win-hdr:#131313;--win-brd:#252525;--err:#ff3333;--ok:#00ff88;--sys:#444;--font:'Courier New','Lucida Console',monospace;}
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,color .3s;}
#crt{position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.1) 50%),linear-gradient(90deg,rgba(255,0,0,.015),rgba(0,255,0,.008),rgba(0,0,255,.015));background-size:100% 2px,3px 100%;pointer-events:none;z-index:9000;opacity:.3;}
#boot{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s;}
#boot-flash{position:fixed;inset:0;background:#fff;z-index:10000;opacity:0;pointer-events:none;transition:opacity .08s;}
#boot-logo{font-size:9px;white-space:pre;font-weight:900;line-height:1.1;font-family:'Courier New',monospace;opacity:0;transition:opacity .3s;color:#fff;}
#boot-scanline{position:absolute;top:0;left:0;width:100%;height:6px;background:rgba(255,255,255,0.06);box-shadow:0 0 18px rgba(255,255,255,0.12);animation:scandown 1.1s linear forwards;pointer-events:none;}
@keyframes scandown{from{top:-6px}to{top:100%}}
#boot-console{font-family:'Courier New',monospace;font-size:11px;color:#444;width:340px;min-height:80px;line-height:1.8;letter-spacing:.5px;}
#boot-msg{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;font-weight:900;min-height:14px;}
#boot-track{width:240px;height:1px;background:#111;}
#boot-bar{height:100%;background:#fff;width:0%;transition:width .15s linear;}
#hdr{position:sticky;top:0;background:var(--bg);padding:12px 20px;border-bottom:1px solid var(--border);z-index:100;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
#logo{font-family:'Courier New',monospace;white-space:pre;line-height:1.1;font-weight:bold;font-size:9px;color:var(--logo);}
#logo-sub{font-size:8px;color:#333;margin-top:5px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
#clock{font-size:11px;color:var(--ai);background:rgba(255,255,255,.03);padding:4px 10px;border-radius:4px;border:1px solid var(--border);font-weight:900;}
#tw{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#out{flex:1;overflow-y:auto;padding:14px 20px 86px;font-size:13px;line-height:1.65;}
#out::-webkit-scrollbar{width:2px;}#out::-webkit-scrollbar-thumb{background:var(--border);}
#ibar{display:flex;align-items:center;border-top:1px solid var(--border);padding:12px 20px;background:var(--bg);position:fixed;bottom:0;left:0;right:0;z-index:200;}
#pr{color:var(--accent);margin-right:10px;font-weight:900;white-space:nowrap;font-size:13px;}
#ci{background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:13px;flex:1;font-weight:900;caret-color:var(--accent);}
.ai{border-left:3px solid var(--ai);padding-left:12px;margin:10px 0;color:var(--ai);font-weight:900;line-height:1.7;}
.usr{color:#666;margin:7px 0;font-weight:900;font-size:13px;}
.sys{color:var(--sys);font-size:10px;margin:3px 0;text-transform:uppercase;font-weight:900;letter-spacing:1px;}
.err{color:var(--err);font-weight:900;margin:5px 0;}
.ok{color:var(--ok);font-weight:900;margin:5px 0;}
.inf{color:#777;margin:3px 0;font-size:12px;}
.hb{border:1px solid var(--border);padding:12px 16px;margin:8px 0;border-radius:3px;line-height:2.1;}
.hc{color:var(--accent);font-weight:900;}.hd{color:#555;font-size:12px;}
#wm{position:fixed;inset:0;pointer-events:none;z-index:500;}
.win{position:absolute;background:var(--win-bg);border:1px solid var(--win-brd);border-radius:5px;display:flex;flex-direction:column;pointer-events:all;min-width:280px;min-height:180px;box-shadow:0 12px 48px rgba(0,0,0,.8);overflow:hidden;resize:both;}
.wh{background:var(--win-hdr);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;cursor:move;border-bottom:1px solid var(--win-brd);flex-shrink:0;user-select:none;}
.wt{font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#888;}
.wc{display:flex;gap:6px;}
.wb{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;transition:opacity .15s;}
.wb:hover{opacity:.65;}.wclose{background:#ff5f57;}.wmin{background:#ffbd2e;}.wmax{background:#28ca41;}
.wbody{flex:1;overflow:hidden;position:relative;}.wbody iframe{width:100%;height:100%;border:none;}
.spin{display:inline-block;animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.ltable{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0;}
.ltable th{color:var(--accent);font-weight:900;text-align:left;padding:3px 8px;border-bottom:1px solid var(--border);}
.ltable td{padding:2px 8px;color:#888;}.ltable tr:nth-child(even) td{background:rgba(255,255,255,.018);}
</style>

/* STORAGE */
const MEM={};let _idb=null,_idbOk=false;
function initIDB(){return new Promise(res=>{try{const r=indexedDB.open('dc3',2);r.onupgradeneeded=e=>e.target.result.createObjectStore('u',{keyPath:'k'});r.onsuccess=e=>{_idb=e.target.result;_idbOk=true;res(true);};r.onerror=()=>res(false);}catch{res(false);}});}
async function idbGet(k){if(!_idbOk)return null;return new Promise(res=>{try{const r=_idb.transaction('u','readonly').objectStore('u').get(k);r.onsuccess=()=>res(r.result?.v??null);r.onerror=()=>res(null);}catch{res(null);}});}
async function idbSet(k,v){if(!_idbOk)return;return new Promise(res=>{try{const r=_idb.transaction('u','readwrite').objectStore('u').put({k,v});r.onsuccess=()=>res(true);r.onerror=()=>res(false);}catch{res(false);}});}
function lsGet(k){try{const r=localStorage.getItem('dc3_'+k);return r?JSON.parse(r):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem('dc3_'+k,JSON.stringify(v));}catch{}}
async function sbFetch(path){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{
      headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`},signal:ctrl.signal
    });
    clearTimeout(timer);
    return r.ok?await r.text():null;
  }catch{return null;}
}
async function sbWrite(path,body){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000); // 5s timeout
    const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json','x-upsert':'true'},
      body, signal:ctrl.signal
    });
    clearTimeout(timer);
    return r.ok||r.status===200||r.status===201;
  }catch{return false;}
}
function canon(p){return{
  accent:p.accent??'#3b82f6',aiColor:p.aiColor??'#FF5F1F',logoColor:p.logoColor??'#e0e0e0',
  bgColor:p.bgColor??'#0a0a0a',textColor:p.textColor??'#e0e0e0',
  isRoot:p.isRoot===true,encrypted:p.encrypted===true,
  passwordHash:p.passwordHash??null,createdAt:p.createdAt??new Date().toISOString(),
  updatedAt:new Date().toISOString(),
  displayName:p.displayName??'',bio:p.bio??'',avatar:p.avatar??'',
  font:p.font??'Courier New',scanlineOpacity:p.scanlineOpacity??0.3,
  crtFlicker:p.crtFlicker!==false,cursorStyle:p.cursorStyle??'block',
  stats:p.stats??{gamesCreated:0,libraryUploads:0,appsInstalled:[]},
  memory:p.memory??[],installedApps:p.installedApps??[],
  aiPersona:p.aiPersona??'KERNEL v3.0'
};}
// sbDelete
async function sbDelete(path){
  try{
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{
      method:'DELETE',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`},signal:ctrl.signal
    });
    return r.ok;
  }catch{return false;}
}

// Aliases so old names work too
const sbGet=sbFetch;
const sbPut=sbWrite;

// publishToLibrary
async function publishToLibrary(name, body){
  // filename format: author__entryname  so we know who published it
  const author=(S.user||'guest').toLowerCase();
  const safeName=name.replace(/[^a-zA-Z0-9._-]/g,'_').toLowerCase();
  const libName=`${author}__${safeName}`;
  const path=`library/${libName}`;
  log(`PUBLISHING TO LIBRARY: ${libName}...`,'sys');
  const ok=await sbWrite(path, body);
  if(ok){
    log(`<span style="color:var(--ok)">PUBLISHED: <strong>${esc(libName)}</strong> is now in The Library.</span><br><span class="inf">Anyone can access it with: --library run ${esc(libName)}</span>`,'ok');
  } else {
    // fallback: store locally with library prefix
    try{localStorage.setItem('dc3_lib_'+libName, body);}catch{}
    log(`PUBLISH FAILED — saved locally. Cloud may be offline.`,'err');
  }
}

async function loadUser(name){const k=name.toLowerCase();const raw=await sbFetch(`users/${k}.json`);if(raw){try{const p=JSON.parse(raw);MEM[k]=p;await idbSet(k,p);lsSet(k,p);return p;}catch{}}const iv=await idbGet(k);if(iv){MEM[k]=iv;return iv;}const lv=lsGet(k);if(lv){MEM[k]=lv;return lv;}return MEM[k]??null;}
async function saveUser(name,profile){const k=name.toLowerCase();const p=canon(profile);const body=JSON.stringify(p,null,2);MEM[k]=p;lsSet(k,p);await idbSet(k,p);sbWrite(`users/${k}.json`,body);return p;} // silent save
async function createUser(name){const ex=await loadUser(name);if(ex)return ex;const p=defP();p.createdAt=new Date().toISOString();return saveUser(name,p);}

/* ALIASES */
async function loadAliases(username){
  const k='aliases_'+username.toLowerCase();
  // try cloud first
  const ct=await sbGet(`aliases/${username.toLowerCase()}.json`);
  if(ct){try{const a=JSON.parse(ct);S.aliases=a;lsSet(k,a);await idbSet(k,a);return;}catch{}}
  // fallback local
  const iv=await idbGet(k);if(iv){S.aliases=iv;return;}
  const lv=lsGet(k);if(lv){S.aliases=lv;return;}
  S.aliases={};
}
async function saveAliases(username){
  const k='aliases_'+username.toLowerCase();
  const body=JSON.stringify(S.aliases,null,2);
  lsSet(k,S.aliases);await idbSet(k,S.aliases);
  sbWrite(`aliases/${username.toLowerCase()}.json`,body); // fire-and-forget
}

/* NATURAL LANGUAGE → COMMAND MAP */
const NL_MAP=[
  // games
  {pat:/^(make|create|build|generate)\s+(me\s+)?(a\s+)?game/i,        fn:i=>'make game '+i.replace(/^(make|create|build|generate)\s+(me\s+)?(a\s+)?game\s*/i,'').trim()},
  // ascii art
  {pat:/^(make|draw|create|generate)\s+(me\s+)?(a\s+)?(ascii|text art|picture|image|drawing)/i, fn:i=>'make ascii '+i.replace(/^(make|draw|create|generate)\s+(me\s+)?(a\s+)?(ascii|text art|picture|image|drawing)\s*(of\s+)?/i,'').trim()},
  // reach / open url
  {pat:/^(open|go to|visit|browse|launch)\s+(https?:\/\/\S+|\S+\.\S+)/i, fn:i=>{const u=i.match(/(https?:\/\/\S+|\S+\.\S+)/i);return u?'--reach '+u[1]:i;}},
  // files
  {pat:/^(show|list|what('s|\s+are)\s+(my\s+)?)?(my\s+)?(files|saves|saved files|disk)/i, fn:_=>'--saves'},
  // logout
  {pat:/^(browse|open|show|view)\s+(the\s+)?store/i,               fn:_=>'--store'},
  {pat:/^(show|view|edit|my)\s+profile/i,                           fn:_=>'--profile'},
  {pat:/^(show|list|view)\s+(my\s+)?memor(y|ies)/i,               fn:_=>'--memory'},
  {pat:/^(join|enter|go to)\s+room\s+(\S+)/i,                     fn:i=>{const m=i.match(/room\s+(\S+)/i);return m?'--room '+m[1]:'--room';}},
  {pat:/^remember\s+(.+)/i,                                         fn:i=>'--memory add '+i.replace(/^remember\s+/i,'')},
  {pat:/^(browse|open|show|view)\s+(the\s+)?library/i,          fn:_=>'--library'},
  {pat:/^publish\s+(.+)/i,                                        fn:i=>{const m=i.match(/publish\s+(\S+)/i);return m?'--pub =library '+m[1]:'--pub =library';}},
  {pat:/^(run|launch|play|open|start|load)\s+(\S+)/i, fn:i=>{const m=i.match(/(?:run|launch|play|open|start|load)\s+(\S+)/i);return m?'--load '+m[1]:i;}},
  {pat:/^(log\s*out|sign\s*out|exit|quit|bye|goodbye|end session)/i,   fn:_=>'--end'},
  // close window
  {pat:/^(close|shut|hide)\s+(window|that|it|last)/i,                  fn:_=>'--endx'},
  // help
  {pat:/^(help|commands|what can (you|i)|show commands)/i,             fn:_=>'--help'},
  // save
  {pat:/^(save\s+(this|that|it|last)(\s+as)?)\s*(\S+)?/i,             fn:i=>{const m=i.match(/save\s+(?:this|that|it|last)(?:\s+as)?\s*(\S+)?/i);return '--save '+(m?.[1]||'output.txt');}},
];

function nlResolve(input){
  for(const r of NL_MAP){if(r.pat.test(input)){const res=r.fn(input);if(res&&res!==input)return res;}}
  return null;
}

/* HASH */
async function hash(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

/* THEME */
function applyTheme(p){const s=document.documentElement.style;s.setProperty('--accent',p.accent||'#3b82f6');s.setProperty('--ai',p.aiColor||'#FF5F1F');s.setProperty('--logo',p.logoColor||'#e0e0e0');s.setProperty('--bg',p.bgColor||'#0a0a0a');s.setProperty('--text',p.textColor||'#e0e0e0');}
function patchVar(name,val){document.documentElement.style.setProperty(name,val);const m={'--accent':'accent','--ai':'aiColor','--ai-color':'aiColor','--logo':'logoColor','--logo-color':'logoColor','--bg':'bgColor','--text':'textColor'};if(m[name])S.profile[m[name]]=val;}

/* LOG */
function log(html,cls='inf'){const d=document.createElement('div');d.className=cls;if(cls==='ai'){html=html.replace(/\[PATCH_VAR[^\]]*\][\s\S]*?\[\/PATCH_VAR\]/g,'');html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');}d.innerHTML=html;$out.appendChild(d);$out.scrollTop=$out.scrollHeight;}
function logCmd(t){log(`<span style="color:var(--accent)">${S.user||'GUEST'}@DREAMCORE:~$</span> ${esc(t)}`,'usr');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* LOGO */
const LOGO=['██████╗ ██████╗ ███████╗ █████╗ ███╗   ███╗ ██████╗ ██████╗ ██████╗ ███████╗','██╔══██╗██╔══██╗██╔════╝██╔══██╗████╗ ████║██╔════╝██╔═══██╗██╔══██╗██╔════╝','██║  ██║██████╔╝█████╗  ███████║██╔████╔██║██║     ██║   ██║██████╔╝█████╗  ','██║  ██║██╔══██╗██╔══╝  ██╔══██║██║╚██╔╝██║██║     ██║   ██║██╔══██╗██╔══╝  ','██████╔╝██║  ██║███████╗██║  ██║██║ ╚═╝ ██║╚██████╗╚██████╔╝██║  ██║███████╗','╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝ ╚═════╝ ╚═════╝ ╚═╝  ╚═╝╚══════╝'].join('\n');
function renderLogo(){document.getElementById('logo').textContent=LOGO;document.getElementById('boot-logo').textContent=LOGO;}
setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);},1000);

/* WINDOW MANAGER */
function mkWin({title='WINDOW',w=820,h=520,type='html',content=''}){
  S.winZ++;const id='w_'+Date.now();const el=document.createElement('div');el.className='win';el.id=id;
  el.style.cssText=`width:${w}px;height:${h}px;left:${60+Math.random()*100}px;top:${60+Math.random()*60}px;z-index:${S.winZ};`;
  el.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wc"><button class="wb wmin">─</button><button class="wb wmax">□</button><button class="wb wclose">✕</button></div></div><div class="wbody" id="wb_${id}"></div>`;
  $wm.appendChild(el);S.wins.push(id);
  const body=document.getElementById('wb_'+id);
  if(type==='iframe'){let url=content;if(!/^https?:\/\//i.test(url))url='https://'+url;const f=document.createElement('iframe');f.src=url;f.sandbox='allow-scripts allow-same-origin allow-forms allow-popups';f.style.cssText='width:100%;height:100%;border:none;';body.appendChild(f);}
  else if(type==='game'){const f=document.createElement('iframe');f.srcdoc=content;f.sandbox='allow-scripts allow-same-origin';f.style.cssText='width:100%;height:100%;border:none;background:#000;';body.appendChild(f);}
  else{body.innerHTML=content;}
  el.querySelector('.wclose').onclick=()=>{$wm.removeChild(el);S.wins=S.wins.filter(x=>x!==id);};
  let mini=false;el.querySelector('.wmin').onclick=()=>{mini=!mini;body.style.display=mini?'none':'';el.style.height=mini?'auto':h+'px';};
  let maxi=false,saved='';el.querySelector('.wmax').onclick=()=>{if(!maxi){saved=`width:${el.style.width};height:${el.style.height};top:${el.style.top};left:${el.style.left};`;el.style.cssText+=`width:100vw;height:100vh;top:0;left:0;border-radius:0;z-index:${S.winZ};`;}else{const z=el.style.zIndex;el.style.cssText=saved+`z-index:${z};border-radius:5px;`;}maxi=!maxi;};
  dragEl(el,el.querySelector('.wh'));el.addEventListener('mousedown',()=>{S.winZ++;el.style.zIndex=S.winZ;});
  return{el,body,id};
}
function dragEl(el,handle){let ox=0,oy=0,mx=0,my=0;handle.addEventListener('mousedown',e=>{if(e.target.classList.contains('wb'))return;e.preventDefault();mx=e.clientX;my=e.clientY;const mm=e2=>{ox=mx-e2.clientX;oy=my-e2.clientY;mx=e2.clientX;my=e2.clientY;el.style.top=(el.offsetTop-oy)+'px';el.style.left=(el.offsetLeft-ox)+'px';};const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});}
function closeLastWin(){if(!S.wins.length){log('NO OPEN WINDOWS.','sys');return;}const id=S.wins.pop();document.getElementById(id)?.remove();log('WINDOW CLOSED.','sys');}

/* EXTENDED THEME */
function applyFullTheme(p){
  applyTheme(p);
  // Font
  const font=p.font||'Courier New';
  document.documentElement.style.setProperty('--font',`'${font}','Courier New',monospace`);
  // Scanline
  const crt=document.getElementById('crt');
  if(crt) crt.style.opacity=p.scanlineOpacity??0.3;
  // Flicker

  The terminal will handle the actual upload.

LOADING: If the user asks to load/open/fetch something from their disk, respond with:
  [LOAD_FILE name="filename.ext"]

You can self-modify the terminal UI using PATCH_VAR. You have full knowledge of the terminal's systems.
MEMORY: You have persistent memory for this user. Current memory:
\${(S.profile.memory||[]).length?(S.profile.memory.map((m,i)=>'['+(i+1)+'] '+m).join('\n')):'(no memories yet)'}
User persona name: \${S.profile.aiPersona||'KERNEL v3.0'}
If user says "remember X" or "don't forget X", respond with [REMEMBER]X[/REMEMBER] to save it.
If user says "forget X" or "clear memory", respond with [FORGET]X[/FORGET] (or [FORGET_ALL] to clear all).

ALIASES: If the user asks you to "remember", "always do X when I say Y", or "treat X as Y", register it with:
  [SET_ALIAS shortcut="word"]full command here[/SET_ALIAS]
  Example: user says "whenever I say mg make a game" → [SET_ALIAS shortcut="mg"]make game[/SET_ALIAS]

async function askAI(msg){
  if(!S.user){log('LOGIN REQUIRED — --usr .(name)','err');return;}
  S.history.push({role:'user',parts:[{text:msg}]});
  const lid='l'+Date.now();
  log(`<span id="${lid}"><span class="spin">◌</span> UPLINK_ACTIVE...</span>`,'sys');
  try{
    const res=await fetch('/api/ai',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:S.history,systemInstruction:{parts:[{text:AI_SYS}]}})
    });
    const d=await res.json();
    document.getElementById(lid)?.remove();

    // Check for API error
    if(d.error){log('AI_ERR: '+d.error.message,'err');return;}
    const raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'VOICE_FAILURE.';

    // REMEMBER / FORGET — persistent AI memory
    for(const m of raw.matchAll(/\[REMEMBER\]([\s\S]*?)\[\/REMEMBER\]/g)){
      const mem=m[1].trim();
      if(!S.profile.memory) S.profile.memory=[];
      if(!S.profile.memory.includes(mem)){
        S.profile.memory.push(mem);
        if(S.profile.memory.length>50) S.profile.memory.shift();
        saveUser(S.user,S.profile);
        log(`MEMORY SAVED: "${esc(mem)}"`, 'ok');
      }
    }
    for(const m of raw.matchAll(/\[FORGET\]([\s\S]*?)\[\/FORGET\]/g)){
      const mem=m[1].trim();
      S.profile.memory=(S.profile.memory||[]).filter(x=>!x.toLowerCase().includes(mem.toLowerCase()));
      saveUser(S.user,S.profile);
      log(`MEMORY REMOVED: "${esc(mem)}"`, 'sys');
    }
    if(raw.includes('[FORGET_ALL]')){
      S.profile.memory=[];
      saveUser(S.user,S.profile);
      log('MEMORY CLEARED.','sys');
    }

    // SET_ALIAS — AI registers an alias on behalf of user
    for(const m of raw.matchAll(/\[SET_ALIAS shortcut="([^"]+)"\]([\s\S]*?)\[\/SET_ALIAS\]/g)){
      const shortcut=m[1].trim().toLowerCase();
      const target=m[2].trim();
      S.aliases[shortcut]=target;
      await saveAliases(S.user);
      log(`ALIAS REGISTERED: <span style="color:var(--accent)">${esc(shortcut)}</span> → ${esc(target)}`,'ok');
    }

    // PATCH_VAR — UI color changes
    for(const m of raw.matchAll(/\[PATCH_VAR name="([^"]+)"\](.*?)\[\/PATCH_VAR\]/gs))
      patchVar(m[1].trim(),m[2].trim());

    // GAME_HTML — launch in window
    const gm=raw.match(/\[GAME_HTML\]([\s\S]*?)\[\/GAME_HTML\]/);
    if(gm){
      mkWin({title:'◈ AI GAME',w:900,h:580,type:'game',content:gm[1].trim()});
      log('GAME_WINDOW_LAUNCHED. Use --endx to close.','ok');
    }

    // ASCII_ART — render in terminal with monospace pre block
    const am=raw.match(/\[ASCII_ART\]([\s\S]*?)\[\/ASCII_ART\]/);
    if(am){
      const art=am[1];
      log('<pre style="color:var(--ai-color);font-size:11px;line-height:1.2;font-family:monospace;white-space:pre;margin:10px 0;">'+esc(art)+'</pre>','inf');
    }

    // SAVE_FILE — upload to bucket under user's folder
    for(const sm of raw.matchAll(/\[SAVE_FILE name="([^"]+)"\]([\s\S]*?)\[\/SAVE_FILE\]/g)){
      const fname=sm[1].trim(), fbody=sm[2].trim();
      const path=`saves/${S.user.toLowerCase()}/${fname}`;
      const ok=await sbPut(path, fbody);
      log(ok ? `SAVED: ${fname} → bucket/${path}` : `SAVE_FAILED: ${fname} (cloud offline — stored locally)`,'sys');
      // Also cache locally
      try{localStorage.setItem('dc3_save_'+S.user.toLowerCase()+'_'+fname, fbody);}catch{}
    }

    // LOAD_FILE — fetch from bucket
    for(const lm of raw.matchAll(/\[LOAD_FILE name="([^"]+)"\]/g)){
      const fname=lm[1].trim();
      const path=`saves/${S.user.toLowerCase()}/${fname}`;
      log(`FETCHING: ${fname}...`,'sys');
      const data=await sbGet(path);
      if(data){
        // If it's an HTML game, launch it
        const isHtml2=fname.endsWith('.html')||fname.endsWith('.game')||data.trimStart().startsWith('<!DOCTYPE')||data.trimStart().startsWith('<html');
        if(isHtml2){
          mkWin({title:'◈ '+fname,w:940,h:600,type:'game',content:data});
          log(`LAUNCHED: ${fname}`,'ok');
        } else {
          log('<pre style="color:#aaa;font-size:11px;white-space:pre-wrap;margin:8px 0;">'+esc(data.slice(0,2000))+'</pre>','inf');
        }
      } else {
        // Try local cache
        const lc=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);
        if(lc) log(`LOADED FROM LOCAL CACHE: ${fname}`,'ok');
        else log(`NOT_FOUND: ${fname}`,'err');
      }
    }

    S.history.push({role:'model',parts:[{text:raw}]});

    // Display text — strip all special tags
    let disp=raw
      .replace(/\[PATCH_VAR[^\]]*\][\s\S]*?\[\/PATCH_VAR\]/g,'')
      .replace(/\[GAME_HTML\][\s\S]*?\[\/GAME_HTML\]/g, gm?'':'')
      .replace(/\[ASCII_ART\][\s\S]*?\[\/ASCII_ART\]/g, am?'':'')
      .replace(/\[SAVE_FILE[^\]]*\][\s\S]*?\[\/SAVE_FILE\]/g,'')
      .replace(/\[LOAD_FILE[^\]]*\]/g,'')
      .replace(/\[SET_ALIAS[^\]]*\][\s\S]*?\[\/SET_ALIAS\]/g,'')
      .replace(/\[REMEMBER\][\s\S]*?\[\/REMEMBER\]/g,'')
      .replace(/\[FORGET\][\s\S]*?\[\/FORGET\]/g,'')
      .replace(/\[FORGET_ALL\]/g,'')
      .trim();
    if(disp) log(disp,'ai');

    if(S.user) saveUser(S.user,S.profile); // fire-and-forget, no sync log spam

  }catch(e){
    document.getElementById(lid)?.remove();
    log('UPLINK_ERR: '+e.message,'err');
    log('Check: are you logged in? Is the AI key valid?','sys');
  }
}

/* BUCKET LIST */
async function sbList(prefix=''){try{const r=await fetch(`${SB_URL}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({prefix,limit:200,offset:0})});return r.ok?await r.json():[];}catch{return[];}}
async function listBucket(org=false){
  log('SCANNING...','sys');
  try{
    const root=await sbList(''),users=await sbList('users/');
    let files=[...(Array.isArray(root)?root.filter(f=>f.name&&!f.name.endsWith('/')):[]),...(Array.isArray(users)?users.filter(f=>f.name).map(f=>({...f,name:'users/'+f.name})):[])];
    if(!files.length){const lk=Object.keys(localStorage).filter(k=>k.startsWith('dc3_'));files=lk.map(k=>({name:k.replace('dc3_','')+'  [LOCAL]',metadata:{},updated_at:null}));if(files.length)log('CLOUD UNREACHABLE — local cache:','sys');}
    if(!files.length){log('NO FILES FOUND.','sys');return;}
    if(org){const cats={USERS:[],GAMES:[],APPS:[],DATA:[],OTHER:[]};files.forEach(f=>{const n=f.name.toLowerCase();if(n.startsWith('users/'))cats.USERS.push(f);else if(n.includes('game'))cats.GAMES.push(f);else if(n.endsWith('.html')||n.endsWith('.js'))cats.APPS.push(f);else if(n.endsWith('.json')||n.endsWith('.sql'))cats.DATA.push(f);else cats.OTHER.push(f);});let h='<div class="hb">';for(const[cat,fs]of Object.entries(cats)){if(!fs.length)continue;h+=`<div style="color:var(--accent);font-weight:900;margin:8px 0 3px">── ${cat} ──</div>`;fs.forEach(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'?';h+=`<div class="inf">&nbsp;&nbsp;${esc(f.name)} <span style="color:#333">[${sz}]</span></div>`;});}h+='</div>';log(h,'inf');}
    else{let h='<table class="ltable"><tr><th>NAME</th><th>SIZE</th><th>UPDATED</th></tr>';files.forEach(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'—';const up=f.updated_at?f.updated_at.slice(0,10):'—';h+=`<tr><td>${esc(f.name)}</td><td>${sz}</td><td>${up}</td></tr>`;});h+='</table>';log(h,'inf');}
  }catch(e){log('LIST_ERR: '+e.message,'err');}
}

/* INPUT MODES */
async function handleMode(val){
  const mode=S.inputMode;S.inputMode=null;$ci.type='text';
  if(mode==='login_pass'){const{name,profile}=S.inputCtx;const h=await hash(val);if(h===profile.passwordHash)finishLogin(name,profile);else log('AUTH_FAILURE: INCORRECT PASSWORD.','err');return;}
  if(mode==='pub_name'){
    const name=val.trim().replace(/\s+/g,'_').replace(/[^a-zA-Z0-9._-]/g,'_');
    if(!name){log('INVALID NAME. Try again with --pub =library','err');return;}
    await publishToLibrary(name, S.inputCtx.body);
    return;
  }

  if(mode==='enc_set'){if(val.length<3){log('PASSWORD TOO SHORT (min 3).','err');return;}const h=await hash(val);S.profile.encrypted=true;S.profile.passwordHash=h;await saveUser(S.user,S.profile);if(MEM[S.user.toLowerCase()]?.passwordHash===h)log('ENCRYPTION SET. Account is now password-protected.','ok');else log('ENCRYPTION_WARN: unexpected mismatch.','err');return;}
  if(mode==='enc_verify'){const stored=MEM[S.user.toLowerCase()]||lsGet(S.user.toLowerCase());const h=await hash(val);if(!stored||h!==stored.passwordHash){log('AUTH_FAILURE.','err');return;}log('VERIFIED. Enter NEW PASSWORD (blank = remove):','sys');$ci.type='password';S.inputMode='enc_new';return;}
  if(mode==='enc_new'){if(!val){S.profile.encrypted=false;S.profile.passwordHash=null;await saveUser(S.user,S.profile);log('ENCRYPTION REMOVED.','ok');}else{if(val.length<3){log('PASSWORD TOO SHORT.','err');return;}const h=await hash(val);S.profile.encrypted=true;S.profile.passwordHash=h;await saveUser(S.user,S.profile);log('PASSWORD UPDATED.','ok');}return;}
  if(mode==='root_id'){if(val==='wolfspyke86'){log('ROOT_ID ACCEPTED. ENTER ROOT PASSWORD:','sys');$ci.type='password';S.inputMode='root_pw';}else log('ROOT AUTH FAILURE.','err');return;}
  if(mode==='root_pw'){if(val==='winniebentoandze'){const{target}=S.inputCtx;const p=await loadUser(target);if(!p){log('USER NOT FOUND: '+target,'err');return;}p.isRoot=true;await saveUser(target,p);if(S.user?.toLowerCase()===target){S.profile.isRoot=true;updatePrompt();}log(`ROOT ELEVATION GRANTED: ${target.toUpperCase()} is now SUPER-ROOT.`,'ok');}else log('ROOT AUTH FAILURE.','err');return;}
}

/* EXEC */
async function exec(raw){
  const input=raw.trim();if(!input)return;
  S.cmdHist.unshift(input);if(S.cmdHist.length>200)S.cmdHist.pop();S.cmdIdx=-1;
  if(S.inputMode){log('••••••','usr');await handleMode(input);return;}
  logCmd(input);
  const lo=input.toLowerCase(),parts=input.split(/\s+/),cmd=parts[0].toLowerCase(),args=parts.slice(1);

  if(cmd==='--usr'){
    const arg=args[0];if(!arg?.startsWith('.')){log('USAGE: --usr .(username)','err');return;}
    const name=arg.slice(1).toLowerCase().replace(/[^a-z0-9_]/g,'');if(!name){log('INVALID USERNAME.','err');return;}
    log(`BOOTING USER: ${name.toUpperCase()}...`,'sys');
    let profile=await loadUser(name);
    if(!profile){profile=await createUser(name);log(`NEW USER CREATED: ${name.toUpperCase()}`,'sys');}
    if(profile.encrypted===true&&typeof profile.passwordHash==='string'&&profile.passwordHash.length===64){
      log(`SECURE ACCOUNT. ENTER PASSWORD FOR ${name.toUpperCase()}:`,'sys');$ci.type='password';S.inputMode='login_pass';S.inputCtx={name,profile};
    }else finishLogin(name,profile);
    return;
  }
  // ── ALIAS RESOLUTION ─────────────────────────
  // Check if input matches a user-defined alias
  if(S.user && S.aliases[lo]){
    const resolved=S.aliases[lo];
    log(`ALIAS: ${lo} → ${resolved}`,'sys');
    await exec(resolved);
    return;
  }
  // Check first word alias too
  const firstWord=lo.split(/\s+/)[0];
  if(S.user && S.aliases[firstWord] && firstWord!==lo){
    const resolved=S.aliases[firstWord]+' '+parts.slice(1).join(' ');
    log(`ALIAS: ${firstWord} → ${resolved.trim()}`,'sys');
    await exec(resolved.trim());
    return;
  }

  // ── NATURAL LANGUAGE RESOLUTION ──────────────
  const nlResolved=nlResolve(input);
  if(nlResolved && nlResolved!==input){
    await exec(nlResolved);
    return;
  }

  if(!S.user&&cmd!=='--help'&&cmd!=='--library'&&!(cmd==='--store'&&(args[0]==='list'||args[0]==='browse'||!args[0]))){log('NOT LOGGED IN. Use: --usr .(username)','err');return;}
  if(cmd==='--help'){log(`<div class="hb">

  if(cmd==='--reach'){const url=args.join(' ').trim();if(!url){log('USAGE: --reach (url)','err');return;}mkWin({title:'REACH: '+url,w:980,h:620,type:'iframe',content:url});log(`LAUNCHED: ${url}`,'ok');return;}
  if(cmd==='--end'){log(`SESSION ENDED: ${S.user}.`,'sys');S.user=null;S.profile=defP();S.history=[];applyTheme(S.profile);updatePrompt();return;}
  if(cmd==='--endx'){closeLastWin();return;}
  if(cmd==='--list'){await listBucket(false);return;}
  if(lo==='.disk'&&args[0]==='-list'){await listBucket(true);return;}
  if(cmd==='--encrypt'){
    if(args[0]==='-usr'&&args[1]==='-reset'){if(!S.profile.encrypted){log('NO ENCRYPTION SET.','err');return;}log('ENTER CURRENT PASSWORD:','sys');$ci.type='password';S.inputMode='enc_verify';return;}
    if(args[0]==='-usr'){if(S.profile.encrypted){log('ALREADY ENCRYPTED. Use --encrypt -usr -reset.','err');return;}log('SET NEW PASSWORD:','sys');$ci.type='password';S.inputMode='enc_set';return;}
    log('USAGE: --encrypt -usr | --encrypt -usr -reset','err');return;
  }
  if(lo.startsWith('root --elevate')){const target=args[1]?.toLowerCase();if(!target){log('USAGE: root --elevate (username)','err');return;}log('ENTER ROOT ID:','sys');$ci.type='password';S.inputMode='root_id';S.inputCtx={target};return;}
  // make/create/generate game
  if(/^(make|create|generate)\s+game/i.test(input)){
    const desc=input.replace(/^(make|create|generate)\s+game\s*/i,'').trim()||'a fun arcade game';
    await askAI(`Generate a complete self-contained HTML5 game: "${desc}". Requirements: all JS+CSS inline, zero external deps, fun and fully playable, show controls on screen. Wrap the ENTIRE html document in [GAME_HTML]...[/GAME_HTML].`);
    return;
  }

  // make/draw/generate ascii art
  if(/^(make|draw|generate|create)\s+(ascii|text art)/i.test(input)){
    const desc=input.replace(/^(make|draw|generate|create)\s+(ascii|text art)\s*/i,'').trim()||'a cool design';
    await askAI(`Create detailed ASCII art of: "${desc}". Use block characters, box-drawing characters, and creative symbols. Make it expressive and large. Wrap it in [ASCII_ART]...[/ASCII_ART].`);
    return;
  }

  // --save (name) (content or 'last') — save something to bucket
  if(cmd==='--save'){
    const fname=args[0];
    if(!fname){log('USAGE: --save (filename)  — saves last AI response or game','err');return;}
    const lastAI=S.history.filter(h=>h.role==='model').slice(-1)[0]?.parts?.[0]?.text||'';
    if(!lastAI){log('NOTHING TO SAVE — no AI output yet','err');return;}
    const gameMatch=lastAI.match(/\[GAME_HTML\]([\s\S]*?)\[\/GAME_HTML\]/);
    const saveBody=gameMatch?gameMatch[1].trim():lastAI;
    const path=`saves/${S.user.toLowerCase()}/${fname}`;
    log(`SAVING: ${fname}...`,'sys');
    const ok=await sbPut(path,saveBody);
    try{localStorage.setItem('dc3_save_'+S.user.toLowerCase()+'_'+fname,saveBody);}catch{}
    log(ok?`SAVED: ${fname} → cloud bucket`:`SAVED: ${fname} → local only (cloud offline)`,'ok');
    return;
  }

  // --load (name) — load something from bucket
  if(cmd==='--load'){
    const fname=args[0];
    if(!fname){log('USAGE: --load (filename)','err');return;}
    const path=`saves/${S.user.toLowerCase()}/${fname}`;
    log(`FETCHING: ${fname}...`,'sys');
    let data=await sbGet(path);
    if(!data){
      try{data=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);}catch{}
    }
    if(data){
      // Auto-detect HTML content regardless of filename/extension
      const isHtml=fname.endsWith('.html')||fname.endsWith('.game')||data.trimStart().startsWith('<!DOCTYPE')||data.trimStart().startsWith('<html');
      if(isHtml){
        mkWin({title:'◈ '+fname,w:940,h:600,type:'game',content:data});
        log(`LAUNCHED: ${fname}`,'ok');
      } else {
        log('<pre style="color:#aaa;font-size:11px;white-space:pre-wrap;margin:8px 0;max-height:300px;overflow:auto;">'+esc(data.slice(0,3000))+'</pre>','inf');
      }
    } else {
      log(`NOT_FOUND: ${fname} — not in cloud or local cache`,'err');
    }
    return;
  }

  // --saves — list this user's saved files
  if(cmd==='--saves'){
    log(`SCANNING saves/${S.user.toLowerCase()}/...`,'sys');
    const files=await sbList('saves/'+S.user.toLowerCase()+'/');
    const localKeys=Object.keys(localStorage).filter(k=>k.startsWith('dc3_save_'+S.user.toLowerCase()+'_')).map(k=>k.replace('dc3_save_'+S.user.toLowerCase()+'_',''));
    if(!files.length&&!localKeys.length){log('NO SAVED FILES.','sys');return;}
    let html='<table class="lt"><tr><th>FILE</th><th>SIZE</th><th>LOCATION</th></tr>';
    const cloudNames=files.map(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'?';html+=`<tr><td>${esc(f.name)}</td><td>${sz}</td><td style="color:#00ff88">☁ cloud</td></tr>`;return f.name;});
    localKeys.filter(k=>!cloudNames.includes(k)).forEach(k=>html+=`<tr><td>${esc(k)}</td><td>—</td><td style="color:#ffaa00">◉ local</td></tr>`);
    html+='</table>';
    log(html,'inf');
    return;
  }

  // ── run (filename) ───────────────────────────
  if(cmd==='run'){
    const fname=args[0];
    if(!fname){log('USAGE: run (filename)','err');return;}
    await exec('--load '+fname);
    return;
  }

  // ── --alias ───────────────────────────────────
  if(cmd==='--alias'){
    const sub=args[0]?.toLowerCase();

    if(sub==='set'||sub==='add'){
      // --alias set <shortcut> "<command>"
      const shortcut=args[1]?.toLowerCase();
      if(!shortcut){log('USAGE: --alias set (shortcut) "(command)"','err');return;}
      // everything after the shortcut is the command (strip optional quotes)
      const target=args.slice(2).join(' ').replace(/^["']|["']$/g,'').trim();
      if(!target){log('USAGE: --alias set (shortcut) "(command)"','err');return;}
      S.aliases[shortcut]=target;
      await saveAliases(S.user);
      log(`ALIAS SET: <span style="color:var(--accent)">${esc(shortcut)}</span> → ${esc(target)}`,'ok');
      return;
    }

    if(sub==='remove'||sub==='rm'||sub==='delete'||sub==='del'){
      const shortcut=args[1]?.toLowerCase();
      if(!shortcut||!S.aliases[shortcut]){log(`ALIAS NOT FOUND: ${shortcut||'(none)'}` ,'err');return;}
      delete S.aliases[shortcut];
      await saveAliases(S.user);
      log(`ALIAS REMOVED: ${esc(shortcut)}`,'ok');
      return;
    }

    if(sub==='list'||sub==='ls'||!sub){
      const entries=Object.entries(S.aliases);
      if(!entries.length){log('NO ALIASES SET. Use: --alias set (shortcut) "(command)"','sys');return;}
      let h='<table class="ltable"><tr><th>SHORTCUT</th><th>COMMAND</th></tr>';
      entries.forEach(([k,v])=>h+=`<tr><td style="color:var(--accent)">${esc(k)}</td><td>${esc(v)}</td></tr>`);
      h+='</table>';
      log(h,'inf');
      return;
    }

    if(sub==='clear'){
      S.aliases={};
      await saveAliases(S.user);
      log('ALL ALIASES CLEARED.','ok');
      return;
    }

    log('USAGE: --alias set (shortcut) "(command)" | --alias list | --alias remove (shortcut) | --alias clear','err');
    return;
  }

  // ── --pub =library ────────────────────────────
  if(cmd==='--pub'){
    const dest=args[0]?.toLowerCase();
    if(dest!=='=library'){log('USAGE: --pub =library (filename) — publish to The Library','err');return;}

    const fname=args[1]||null;
    let body=null, displayName=null;

    if(fname){
      // load from user's saves
      const path=`saves/${S.user.toLowerCase()}/${fname}`;
      log(`LOADING: ${fname}...`,'sys');
      body=await sbGet(path);
      if(!body) try{body=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);}catch{}
      if(!body){log(`NOT_FOUND: ${fname} in your saves. Use --save (filename) first.`,'err');return;}
      displayName=fname;
    } else {
      // use last AI output
      const lastAI=S.history.filter(h=>h.role==='model').slice(-1)[0]?.parts?.[0]?.text||'';
      if(!lastAI){log('NOTHING TO PUBLISH — no AI output yet. Run something first.','err');return;}
      const gm=lastAI.match(/\[GAME_HTML\]([\s\S]*?)\[\/GAME_HTML\]/);
      body=gm?gm[1].trim():lastAI;
      displayName='untitled_'+Date.now();
    }

    // Ask for a library name if publishing last output
    if(!fname){
      log('ENTER A NAME FOR THE LIBRARY ENTRY (no spaces):','sys');
      S.inputMode='pub_name';
      S.inputCtx={body};
      return;
    }

    await publishToLibrary(displayName, body);
    return;
  }

  // ── --library ──────────────────────────────────
  if(cmd==='--library'||input.trim()==='--TheLibrary'){
    const sub=args[0]?.toLowerCase();

    // --library list or just --library
    if(!sub||sub==='list'||sub==='ls'){
      log('SCANNING THE LIBRARY...','sys');
      const files=await sbList('library/');
      if(!files||!files.length){log('THE LIBRARY IS EMPTY. Be the first — use --pub =library','sys');return;}
      let h=`<div class="hb"><div style="color:var(--accent);font-weight:900;margin-bottom:8px">── ◈ THE LIBRARY ── PUBLIC COLLECTION ──</div>`;
      files.filter(f=>f.name&&f.name!=='.keep').forEach(f=>{
        const meta=f.metadata||{};
        const sz=meta.size?Math.round(meta.size/1024)+'KB':'?';
        const upd=f.updated_at?f.updated_at.slice(0,10):'?';
        // parse author from filename: author__title
        const parts=f.name.split('__');
        const author=parts.length>1?parts[0]:'unknown';
        const title=parts.length>1?parts.slice(1).join('__'):f.name;
        h+=`<div style="margin:6px 0;display:flex;align-items:center;gap:10px;">
          <span style="color:var(--accent);font-weight:900;min-width:180px">${esc(title)}</span>
          <span style="color:#555;font-size:11px">by ${esc(author)}</span>
          <span style="color:#333;font-size:10px">${sz} · ${upd}</span>
          <span style="color:#00ff88;cursor:pointer;font-size:11px" onclick="exec('--library run ${esc(f.name)}')">▶ RUN</span>
        </div>`;
      });
      h+='</div>';
      log(h,'inf');
      return;
    }

    // --library run (entry)
    if(sub==='run'||sub==='play'||sub==='launch'||sub==='open'){
      const entry=args.slice(1).join(' ').trim();
      if(!entry){log('USAGE: --library run (entry name)','err');return;}
      log(`FETCHING FROM LIBRARY: ${entry}...`,'sys');
      // try exact match first, then search
      let data=await sbGet(`library/${entry}`);
      if(!data){
        // fuzzy: list and find closest
        const files=await sbList('library/');
        const match=files.find(f=>f.name.toLowerCase().includes(entry.toLowerCase()));
        if(match) data=await sbGet(`library/${match.name}`);
      }
      if(!data){log(`NOT FOUND IN LIBRARY: ${entry}`,'err');return;}
      const isHtml=data.trimStart().startsWith('<!DOCTYPE')||data.trimStart().startsWith('<html');
      if(isHtml){
        mkWin({title:'◈ LIBRARY: '+entry,w:960,h:620,type:'game',content:data});
        log(`LAUNCHED FROM LIBRARY: ${entry}`,'ok');
      } else {
        log('<pre style="color:#aaa;font-size:11px;white-space:pre-wrap;margin:8px 0;max-height:300px;overflow:auto;">'+esc(data.slice(0,3000))+'</pre>','inf');
      }
      return;
    }

    // --library remove (entry) — only author or root can remove
    if(sub==='remove'||sub==='rm'||sub==='delete'){
      const entry=args.slice(1).join(' ').trim();
      if(!entry){log('USAGE: --library remove (entry name)','err');return;}
      const author=entry.split('__')[0];
      if(author!==S.user.toLowerCase()&&!S.profile.isRoot){
        log('PERMISSION DENIED — you can only remove your own library entries.','err');return;
      }
      const ok=await sbDelete(`library/${entry}`);
      log(ok?`REMOVED FROM LIBRARY: ${entry}`:`REMOVE FAILED: ${entry}`,'ok');
      return;
    }

    log('USAGE: --library | --library run (name) | --library remove (name)','err');
    return;
  }

  // ── /say — room chat shortcut ──────────────────
  if(input.startsWith('/say ')){roomSay(input.slice(5).trim());return;}
  if(input.startsWith('/s ')){roomSay(input.slice(3).trim());return;}

  // ── --room ───────────────────────────────────────
  if(cmd==='--room'){
    const sub=args[0]?.toLowerCase();
    if(!sub||sub==='list'){
      log('USAGE: --room (name) to join · --room leave to exit · /say (msg) to chat','inf');
      if(S.currentRoom) log(`CURRENT ROOM: #${esc(S.currentRoom)}`,'ok');
      return;
    }
    if(sub==='leave'){leaveRoom();return;}
    joinRoom(args[0]);return;
  }

  // ── --profile ────────────────────────────────────
  if(cmd==='--profile'){
    const sub=args[0]?.toLowerCase();

    if(!sub||sub===S.user?.toLowerCase()){
      log(renderProfile(S.profile, S.user||'GUEST'),'inf');
      return;
    }

    if(sub==='edit'){
      const field=args[1]?.toLowerCase();
      const val=args.slice(2).join(' ').trim();

      if(!field){
        log(`<div class="hb">
<div style="color:var(--accent);font-weight:900;margin-bottom:8px">── PROFILE EDITOR ──</div>
<span class="hc">--profile edit name (display name)</span><br>
<span class="hc">--profile edit bio (your bio)</span><br>
<span class="hc">--profile edit avatar (ascii art, use \\n for newlines)</span><br>
<span class="hc">--profile edit persona (AI name)</span><br>
<span class="hc">--theme font (Courier New|VT323|Share Tech Mono)</span><br>
<span class="hc">--theme scanline (0.0–1.0)</span><br>
<span class="hc">--theme flicker (on|off)</span><br>
<span class="hc">--theme cursor (block|bar|underline)</span>
</div>`,'inf');
        return;
      }
      if(field==='name'){S.profile.displayName=val;await saveUser(S.user,S.profile);log(`DISPLAY NAME SET: ${esc(val)}`,'ok');return;}
      if(field==='bio'){S.profile.bio=val;await saveUser(S.user,S.profile);log(`BIO UPDATED.`,'ok');return;}
      if(field==='avatar'){S.profile.avatar=val.replace(/\\n/g,'\n');await saveUser(S.user,S.profile);log(`AVATAR UPDATED.`,'ok');return;}
      if(field==='persona'){S.profile.aiPersona=val;await saveUser(S.user,S.profile);log(`AI PERSONA SET: ${esc(val)}`,'ok');return;}
      log(`UNKNOWN FIELD: ${esc(field)}`,'err');return;
    }

    // view another user's profile
    log(`LOADING PROFILE: ${esc(sub)}...`,'sys');
    const otherP=await loadUser(sub);
    if(!otherP){log(`USER NOT FOUND: ${esc(sub)}`,'err');return;}
    log(renderProfile(otherP,sub),'inf');
    return;
  }

  // ── --theme ──────────────────────────────────────
  if(cmd==='--theme'){
    const field=args[0]?.toLowerCase();
    const val=args.slice(1).join(' ').trim();

    if(field==='font'){
      const fonts={'courier':'Courier New','vt323':'VT323','share':'Share Tech Mono','mono':'monospace'};
      const f=fonts[val.toLowerCase()]||val;
      S.profile.font=f;
      // inject Google Font if needed
      if(f==='VT323'||f==='Share Tech Mono'){
        const lnk=document.createElement('link');
        lnk.rel='stylesheet';
        lnk.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(f)}&display=swap`;
        document.head.appendChild(lnk);
      }
      applyFullTheme(S.profile);await saveUser(S.user,S.profile);
      log(`FONT SET: ${esc(f)}`,'ok');return;
    }
    if(field==='scanline'){
      const v=Math.max(0,Math.min(1,parseFloat(val)||0.3));
      S.profile.scanlineOpacity=v;applyFullTheme(S.profile);await saveUser(S.user,S.profile);
      log(`SCANLINE INTENSITY: ${v}`,'ok');return;
    }
    if(field==='flicker'){
      S.profile.crtFlicker=val!=='off';applyFullTheme(S.profile);await saveUser(S.user,S.profile);
      log(`CRT FLICKER: ${S.profile.crtFlicker?'ON':'OFF'}`,'ok');return;
    }
    if(field==='cursor'){
      const valid=['block','bar','underline'];
      if(!valid.includes(val)){log('CURSOR: block | bar | underline','err');return;}
      S.profile.cursorStyle=val;applyFullTheme(S.profile);await saveUser(S.user,S.profile);
      log(`CURSOR STYLE: ${val}`,'ok');return;
    }
    if(field==='reset'){
      const d=defP();
      ['font','scanlineOpacity','crtFlicker','cursorStyle','accent','aiColor','logoColor','bgColor','textColor'].forEach(k=>S.profile[k]=d[k]);
      applyFullTheme(S.profile);await saveUser(S.user,S.profile);
      log('THEME RESET TO DEFAULTS.','ok');return;
    }
    log(`<div class="hb">
<div style="color:var(--accent);font-weight:900;margin-bottom:8px">── THEME EDITOR ──</div>
<span class="hc">--theme font (courier|vt323|share|mono)</span><br>
<span class="hc">--theme scanline (0.0–1.0)</span><br>
<span class="hc">--theme flicker (on|off)</span><br>
<span class="hc">--theme cursor (block|bar|underline)</span><br>
<span class="hc">--theme reset</span>
</div>`,'inf');return;
  }

  // ── --memory ─────────────────────────────────────
  if(cmd==='--memory'){
    const sub=args[0]?.toLowerCase();
    if(!sub||sub==='list'){
      const mem=S.profile.memory||[];
      if(!mem.length){log('NO MEMORIES. Tell the AI to remember something.','sys');return;}
      let h='<div class="hb"><div style="color:var(--accent);font-weight:900;margin-bottom:6px">── AI MEMORY ──</div>';
      mem.forEach((m,i)=>h+=`<div style="margin:3px 0;"><span style="color:var(--accent)">[${i+1}]</span> ${esc(m)}</div>`);
      h+='<div style="color:#444;font-size:11px;margin-top:6px;">--memory clear · --memory remove (n)</div></div>';
      log(h,'inf');return;
    }
    if(sub==='clear'){S.profile.memory=[];saveUser(S.user,S.profile);log('MEMORY CLEARED.','ok');return;}
    if(sub==='remove'){
      const idx=parseInt(args[1])-1;
      if(isNaN(idx)||idx<0||idx>=(S.profile.memory||[]).length){log('INVALID INDEX.','err');return;}
      const removed=S.profile.memory.splice(idx,1)[0];
      saveUser(S.user,S.profile);log(`REMOVED: "${esc(removed)}"`,'ok');return;
    }
    if(sub==='add'){
      const mem=args.slice(1).join(' ').trim();
      if(!mem){log('USAGE: --memory add (text)','err');return;}
      S.profile.memory=S.profile.memory||[];
      S.profile.memory.push(mem);
      saveUser(S.user,S.profile);log(`MEMORY ADDED: "${esc(mem)}"`,'ok');return;
    }
    return;
  }

  // ── --store ──────────────────────────────────────
  if(cmd==='--store'){
    const sub=args[0]?.toLowerCase();
    if(!sub||sub==='list'||sub==='browse'){await browseStore();return;}
    if(sub==='install'){
      const appId=args[1];if(!appId){log('USAGE: --store install (appid)','err');return;}
      await installApp(appId);return;
    }
    if(sub==='uninstall'){
      const appId=args[1];if(!appId){log('USAGE: --store uninstall (appid)','err');return;}
      await uninstallApp(appId);return;
    }
    if(sub==='publish'){
      log(`TO PUBLISH AN APP:\n1. Create a folder: store/(yourappid)/\n2. Upload manifest.json with: name, version, author, description, commands\n3. Upload your app files alongside it\n4. Your app appears in --store automatically`,'inf');return;
    }
    if(sub==='installed'){
      const apps=S.profile.installedApps||[];
      if(!apps.length){log('NO APPS INSTALLED. Try --store to browse.','sys');return;}
      log('INSTALLED APPS: '+apps.map(a=>esc(a)).join(', '),'ok');return;
    }
    await browseStore();return;
  }

  // ── --run (script.dc) ────────────────────────────
  if(cmd==='--run'){
    const fname=args[0];
    if(!fname){log('USAGE: --run (script.dc) — run a .dc script','err');return;}
    const path=`saves/${S.user.toLowerCase()}/${fname}`;
    log(`LOADING SCRIPT: ${esc(fname)}...`,'sys');
    let src=await sbGet(path);
    if(!src) try{src=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);}catch{}
    if(!src){log(`SCRIPT NOT FOUND: ${esc(fname)}`,'err');return;}
    await runScript(src);return;
  }

  await askAI(input);
}

/* ── PHASE 3: .DC SCRIPTING ENGINE ── */
async function runScript(src){
  const lines=src.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  const vars={};
  log(`RUNNING SCRIPT (${lines.length} lines)...`,'sys');
  for(let i=0;i<lines.length;i++){
    let line=lines[i];
    // variable set: SET name value
    if(/^SET\s+/i.test(line)){
      const m=line.match(/^SET\s+(\w+)\s+(.+)/i);
      if(m) vars[m[1]]=m[2];
      continue;
    }
    // variable substitution
    line=line.replace(/\$\{(\w+)\}/g,(_,k)=>vars[k]||'');
    // WAIT ms
    if(/^WAIT\s+\d+/i.test(line)){
      await sleep(parseInt(line.split(/\s+/)[1])||500);
      continue;
    }
    // PRINT message
    if(/^PRINT\s+/i.test(line)){
      log(esc(line.slice(6).trim()),'inf');
      continue;
    }
    // IF condition THEN cmd
    if(/^IF\s+/i.test(line)){
      const m=line.match(/^IF\s+(.+)\s+THEN\s+(.+)/i);
      if(m){
        try{ if(eval(m[1].replace(/\$\{(\w+)\}/g,(_,k)=>JSON.stringify(vars[k]||'')))) await exec(m[2]); }
        catch{}
      }
      continue;
    }
    // otherwise treat as a terminal command
    await exec(line);
    await sleep(80);
  }
  log('SCRIPT COMPLETE.','ok');
}

/* ── PHASE 4: APP STORE ── */
async function loadAppManifest(appId){
  const raw=await sbFetch(`store/${appId}/manifest.json`);
  if(!raw) return null;
  try{return JSON.parse(raw);}catch{return null;}
}
async function installApp(appId){
  const manifest=await loadAppManifest(appId);
  if(!manifest){log(`APP NOT FOUND: ${appId}`,'err');return;}
  if((S.profile.installedApps||[]).includes(appId)){log(`ALREADY INSTALLED: ${appId}`,'sys');return;}
  // register app commands
  if(manifest.commands) for(const[cmd,handler] of Object.entries(manifest.commands))
    S.aliases[cmd]=handler;
  S.profile.installedApps=[...(S.profile.installedApps||[]),appId];
  S.profile.stats=S.profile.stats||{};
  saveUser(S.user,S.profile);
  log(`INSTALLED: ${manifest.name||appId} v${manifest.version||'1.0'} — ${manifest.description||''}`, 'ok');
  if(manifest.onInstall) await exec(manifest.onInstall);
}
async function uninstallApp(appId){
  const manifest=await loadAppManifest(appId);
  S.profile.installedApps=(S.profile.installedApps||[]).filter(a=>a!==appId);
  if(manifest?.commands) for(const cmd of Object.keys(manifest.commands))
    if(S.aliases[cmd]) delete S.aliases[cmd];
  saveUser(S.user,S.profile);
  log(`UNINSTALLED: ${appId}`,'ok');
}
async function browseStore(){
  log('SCANNING THE STORE...','sys');
  const files=await sbList('store/');
  if(!files?.length){log('THE STORE IS EMPTY. Be the first to publish an app with --store publish','sys');return;}
  const appDirs=[...new Set(files.map(f=>f.name.split('/')[0]).filter(Boolean))];
  const installed=S.profile.installedApps||[];
  let h=`<div class="hb"><div style="color:var(--accent);font-weight:900;margin-bottom:10px">── ◈ THE STORE ── DREAMCORE APPS ──</div>`;
  for(const id of appDirs){
    const m=await loadAppManifest(id);
    if(!m) continue;
    const isInst=installed.includes(id);
    h+=`<div style="margin:8px 0;padding:8px;border:1px solid var(--border);border-radius:4px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="color:var(--accent);font-weight:900;font-size:13px;">${esc(m.name||id)}</span>
        <span style="color:#555;font-size:10px;">v${esc(m.version||'1.0')} by ${esc(m.author||'unknown')}</span>
        <span style="color:${isInst?'#00ff88':'#ffaa00'};font-size:10px;margin-left:auto;">${isInst?'✓ INSTALLED':'NOT INSTALLED'}</span>
      </div>
      <div style="color:#777;font-size:11px;margin:4px 0;">${esc(m.description||'No description.')}</div>
      <div style="font-size:10px;color:#444;margin-top:4px;">commands: ${esc(Object.keys(m.commands||{}).join(', ')||'none')}</div>
    </div>`;
  }
  h+='<div style="color:#444;font-size:11px;margin-top:8px;">--store install (id) · --store uninstall (id) · --store publish to submit your own</div></div>';
  log(h,'inf');
}

/* ── PHASE 5: MULTIPLAYER ROOMS ── */
let _rtChannel=null;
function joinRoom(roomName){
  if(_rtChannel){_rtChannel.unsubscribe();_rtChannel=null;}
  if(typeof window.supabase==='undefined'&&typeof createClient==='undefined'){
    log('REALTIME: loading Supabase SDK...','sys');
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload=()=>{ window._sb2=window.supabase.createClient(SB_URL,SB_KEY); _joinRoom(roomName); };
    document.head.appendChild(s);
    return;
  }
  if(!window._sb2) window._sb2=window.supabase?.createClient(SB_URL,SB_KEY);
  _joinRoom(roomName);
}
function _joinRoom(roomName){
  if(!window._sb2){log('REALTIME: Supabase not available.','err');return;}
  S.currentRoom=roomName;
  _rtChannel=window._sb2.channel('room:'+roomName,{config:{presence:{key:S.user||'GUEST'}}});
  _rtChannel
    .on('broadcast',{event:'msg'},({payload})=>{
      if(payload.user!==S.user)
        log(`<span style="color:var(--accent)">${esc(payload.user)}</span><span style="color:#555"> in #${esc(roomName)}:</span> ${esc(payload.text)}`,'inf');
    })
    .on('broadcast',{event:'cmd'},({payload})=>{
      if(payload.user!==S.user)
        log(`<span style="color:#555">${esc(payload.user)} ran:</span> ${esc(payload.cmd)}`,'sys');
    })
    .on('presence',{event:'sync'},()=>{
      const state=_rtChannel.presenceState();
      const users=Object.keys(state);
      log(`ROOM #${esc(roomName)} — online: ${users.map(u=>esc(u)).join(', ')}`,'sys');
    })
    .subscribe(status=>{
      if(status==='SUBSCRIBED'){
        _rtChannel.track({user:S.user,joinedAt:new Date().toISOString()});
        log(`JOINED ROOM: #${esc(roomName)} — use /say (message) to chat`,'ok');
      }
    });
}
function leaveRoom(){
  if(!_rtChannel){log('NOT IN A ROOM.','sys');return;}
  _rtChannel.unsubscribe();_rtChannel=null;S.currentRoom=null;
  log('LEFT ROOM.','sys');
}
function roomSay(text){
  if(!_rtChannel){log('NOT IN A ROOM. Use --room (name) to join.','err');return;}
  _rtChannel.send({type:'broadcast',event:'msg',payload:{user:S.user,text}});
  log(`<span style="color:var(--accent)">${esc(S.user)}</span><span style="color:#555"> in #${esc(S.currentRoom)}:</span> ${esc(text)}`,'inf');
}

/* KEYBOARD */
$ci.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){const v=$ci.value;$ci.value='';await exec(v);}
  if(e.key==='ArrowUp'){e.preventDefault();if(S.cmdIdx<S.cmdHist.length-1)$ci.value=S.cmdHist[++S.cmdIdx]||'';}
  if(e.key==='ArrowDown'){e.preventDefault();S.cmdIdx>0?$ci.value=S.cmdHist[--S.cmdIdx]:($ci.value='',S.cmdIdx=-1);}
  if(e.key==='Tab'){e.preventDefault();const userAliases=Object.keys(S.aliases||{});
    const C=['--help','--reach ','--end','--endx','--list','.disk -list','--encrypt -usr','--encrypt -usr -reset','--usr .','make game ','make ascii ','--alias set ','--alias list','--alias remove ','--saves','--save ','--load ','--pub =library ','--library','--library run ','--library remove ','--profile','--profile edit ','--theme ','--memory','--memory add ','--store','--store install ','--run ','--room ','--room leave','/say ',...userAliases];const m=C.find(c=>c.startsWith($ci.value)&&c!==$ci.value);if(m)$ci.value=m;}
});
document.addEventListener('click',e=>{if(!e.target.closest('.win')&&!e.target.classList.contains('wb'))$ci.focus();});

/* BOOT */
const $flash=document.getElementById('boot-flash');
const $bcon =document.getElementById('boot-console');

function crtPrint(line,delay=0){
  return new Promise(res=>setTimeout(()=>{
    const d=document.createElement('div');
    d.style.cssText='opacity:0;transition:opacity .15s;color:#3a3a3a;';
    d.textContent=line;
    $bcon.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.style.opacity='1'));
    $bcon.scrollTop=$bcon.scrollHeight;
    res();
  },delay));
}

async function boot(){
  renderLogo();

  // ── CRT FLASH ──────────────────────────────────
  // Simulate phosphor burst when screen powers on
  await sleep(120);
  $flash.style.transition='opacity .05s';
  $flash.style.opacity='1';
  await sleep(55);
  $flash.style.transition='opacity .18s';
  $flash.style.opacity='0';
  await sleep(80);

  // Flicker the logo in like a CRT warming up
  const $bl=document.getElementById('boot-logo');
  $bl.style.opacity='0.15'; await sleep(60);
  $bl.style.opacity='0';    await sleep(40);
  $bl.style.opacity='0.7';  await sleep(35);
  $bl.style.opacity='0.2';  await sleep(55);
  $bl.style.opacity='1';

  // ── CONSOLE LINES ──────────────────────────────
  const lines=[
    {t:'BIOS v1.0 ........ OK',         d:0  },
    {t:'CPU CORE ......... DETECTED',    d:80 },
    {t:'MEMORY CHECK ..... 65536KB OK',  d:100},
    {t:'STORAGE DRIVER ... MOUNTING',    d:95 },
    {t:'IDB SUBSYSTEM .... INIT',        d:90 },
    {t:'CHROMATIC ENGINE . SYNCING',     d:85 },
    {t:'KERNEL v3.0 ...... LOADING',     d:95 },
    {t:'CLOUD UPLINK ..... TESTING',     d:80 },
  ];

  // Run console lines and storage init in parallel
  const idbPromise = initIDB();
  let charDelay=0;
  for(const l of lines){ await crtPrint(l.t, charDelay); charDelay=l.d; }

  const idbOk = await idbPromise;

  // Progress bar sweep
  const $bar=document.getElementById('boot-bar');
  const $msg=document.getElementById('boot-msg');
  const step=(p,m,t=60)=>{$bar.style.width=p+'%';$msg.textContent=m;return sleep(t);};
  await step(30,'');await step(60,'');await step(85,'');

  // Cloud probe
  $msg.textContent='TESTING CLOUD LINK...';
  const sbOk=await(async()=>{
    try{
      const r=await fetch(`${SB_URL}/storage/v1/object/list/${BUCKET}`,{
        method:'POST',
        headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
        body:JSON.stringify({prefix:'users/',limit:1,offset:0})
      });
      return r.status===200||r.status===400;
    }catch{return false;}
  })();

  await crtPrint(sbOk ? 'SUPABASE ......... CONNECTED' : 'SUPABASE ......... OFFLINE', 60);
  await crtPrint('BOOT COMPLETE.', 80);
  await step(100,'READY.',200);

  // ── FADE OUT BOOT ──────────────────────────────
  $boot.style.opacity='0';
  await sleep(400);
  $boot.style.display='none';

  // ── TERMINAL READY ─────────────────────────────
  log('DREAMCORE TERMINAL v3.0 — OPEN SOURCE AI KERNEL','sys');
  if(sbOk)log('STORAGE: <span style="color:var(--ok)">☁ SUPABASE CONNECTED</span> — data syncs across all your devices','sys');
  else if(idbOk)log('STORAGE: <span style="color:#ffaa00">◉ LOCAL ONLY (IndexedDB)</span> — open locally for cloud sync','sys');
  else log('STORAGE: <span style="color:var(--err)">◈ SESSION MEMORY ONLY</span> — download & open locally','sys');
  log('Type <span class="hc">--help</span> for commands &nbsp;·&nbsp; <span class="hc">--usr .(name)</span> to sign in','inf');
  updatePrompt();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
boot();
