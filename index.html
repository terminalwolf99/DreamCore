function calcStreak(log){
  if(!log||!log.length) return 0;
  const sorted=[...new Set(log)].sort().reverse();
  let streak=0,d=new Date();
  for(const entry of sorted){
    const ed=entry.slice(0,10);const dd=d.toISOString().slice(0,10);
    if(ed===dd){streak++;d.setDate(d.getDate()-1);}else break;
  }
  return streak;
}

let _idleTimer=null,_ssActive=false;
function resetIdle(){
  if(_ssActive) hideScreensaver();
  clearTimeout(_idleTimer);
  _idleTimer=setTimeout(showScreensaver,5*60*1000); // 5 min
}
function showScreensaver(){
  _ssActive=true;
  const d=document.createElement('div');
  d.id='screensaver';
  d.style.cssText='position:fixed;inset:0;background:#000;z-index:99998;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;';

function hideScreensaver(){
  _ssActive=false;
  document.getElementById('screensaver')?.remove();

/* ══════════════════════════════════════════════
   MULTIPLAYER GAME ENGINE
   Parses DC_MULTIPLAYER header, injects sync
   bridge into game iframes via postMessage
══════════════════════════════════════════════ */

// Active multiplayer game sessions: { winId: { channel, isHost, playerIndex, playerCount, mode, sync } }
const _mpSessions = {};

function parseMpHeader(html) {
  const m = html.match(/<!--\s*DC_MULTIPLAYER:\s*(true|false)[^>]*?MODE:\s*(\w+)[^>]*?PLAYERS:\s*(\d+)[^>]*?SYNC:\s*(\w+)\s*-->/i);
  if (!m) return null;
  return {
    enabled: m[1].toLowerCase() === 'true',
    mode: m[2].toLowerCase(),    // singleplayer | multiplayer | both
    maxPlayers: parseInt(m[3]),
    sync: m[4].toLowerCase()     // state | input
  };
}

// Inject the DC bridge API into game HTML before it loads
function injectMpBridge(html, winId, isHost, playerIndex, playerCount, syncMode) {
  const bridge = `
<script>
// ── DreamCore Multiplayer Bridge ──
window.DC_IS_HOST = ${isHost};
window.DC_PLAYER_INDEX = ${playerIndex};
window.DC_PLAYER_COUNT = ${playerCount};
window.DC_WIN_ID = '${winId}';

// Called by game to broadcast state (host only for state sync, any player for input sync)
window.DC_SYNC = function(stateObj) {
  window.parent.postMessage({ type: 'DC_GAME_SYNC', winId: '${winId}', payload: stateObj }, '*');
};
window.DC_INPUT = function(inputObj) {
  window.parent.postMessage({ type: 'DC_GAME_INPUT', winId: '${winId}', payload: inputObj, playerIndex: ${playerIndex} }, '*');
};

// Terminal will call these when remote data arrives
window.DC_ON_SYNC = function(state) {}; // override in game
window.DC_ON_INPUT = function(playerIndex, input) {}; // override in game
window.DC_ON_PLAYER_JOIN = function(playerIndex, count) {}; // override in game
window.DC_ON_PLAYER_LEAVE = function(playerIndex, count) {}; // override in game

// Listen for messages from terminal (incoming remote sync/input)
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'DC_REMOTE_SYNC' && e.data.winId === '${winId}') {
    if (typeof window.DC_ON_SYNC === 'function') window.DC_ON_SYNC(e.data.payload);
  }
  if (e.data.type === 'DC_REMOTE_INPUT' && e.data.winId === '${winId}') {
    if (typeof window.DC_ON_INPUT === 'function') window.DC_ON_INPUT(e.data.playerIndex, e.data.payload);
  }
  if (e.data.type === 'DC_PLAYER_JOIN' && e.data.winId === '${winId}') {
    window.DC_PLAYER_COUNT = e.data.count;
    if (typeof window.DC_ON_PLAYER_JOIN === 'function') window.DC_ON_PLAYER_JOIN(e.data.playerIndex, e.data.count);
  }
  if (e.data.type === 'DC_PLAYER_LEAVE' && e.data.winId === '${winId}') {
    window.DC_PLAYER_COUNT = e.data.count;
    if (typeof window.DC_ON_PLAYER_LEAVE === 'function') window.DC_ON_PLAYER_LEAVE(e.data.playerIndex, e.data.count);
  }
});

console.log('[DreamCore MP] Bridge active — Host:', ${isHost}, '| Player:', ${playerIndex}, '/', ${playerCount});
<\/script>`;

  // inject right after <html> opening tag
  return html.replace(/(<html[^>]*>)/i, '$1\n' + bridge);
}

// Terminal listens for messages from game iframes
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.winId) return;
  const sess = _mpSessions[e.data.winId];
  if (!sess) return;

  if (e.data.type === 'DC_GAME_SYNC') {
    // Broadcast state to all other players in the room via Realtime
    if (sess.channel) {
      sess.channel.send({
        type: 'broadcast', event: 'game_sync',
        payload: { winId: e.data.winId, state: e.data.payload, from: S.user }
      });
    }
  }
  if (e.data.type === 'DC_GAME_INPUT') {
    if (sess.channel) {
      sess.channel.send({
        type: 'broadcast', event: 'game_input',
        payload: { winId: e.data.winId, input: e.data.payload, playerIndex: e.data.playerIndex, from: S.user }
      });
    }
  }
});

// Launch a multiplayer game session
function launchMpGame(title, html, mpInfo) {
  if (!S.currentRoom) {
    log('JOIN A ROOM FIRST to play multiplayer: --room (name)', 'err');
    return;
  }
  if (!window._sb2) {
    log('REALTIME NOT READY. Try again in a moment.', 'err');
    return;
  }

  const winId = 'mpgame_' + Date.now();
  const isHost = true; // launcher is always host
  const playerIndex = 0;

  // Inject bridge into game HTML
  const injected = injectMpBridge(html, winId, isHost, playerIndex, 1, mpInfo.sync);

  // Open game window
  const { body } = mkWin({ title: '◈ ' + title + ' [HOST]', w: 960, h: 620, type: 'html' });
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000;';
  iframe.srcdoc = injected;
  iframe.sandbox = 'allow-scripts allow-same-origin';
  body.appendChild(iframe);

  // Create a dedicated game channel in the current room
  const gameChannel = window._sb2.channel('game:' + S.currentRoom + ':' + winId);
  const session = { channel: gameChannel, isHost, playerIndex, playerCount: 1, mode: mpInfo.mode, sync: mpInfo.sync, iframe, players: [S.user] };
  _mpSessions[winId] = session;

  gameChannel
    .on('broadcast', { event: 'game_join' }, ({ payload }) => {
      if (payload.user === S.user) return;
      session.players.push(payload.user);
      session.playerCount = session.players.length;
      log(`PLAYER JOINED GAME: <span style="color:var(--accent)">${esc(payload.user)}</span> (Player ${session.playerCount})`, 'ok');
      notify(`${esc(payload.user)} joined the game!`, 'ok', 3000);
      // Tell the host's iframe
      iframe.contentWindow?.postMessage({ type: 'DC_PLAYER_JOIN', winId, playerIndex: session.playerCount - 1, count: session.playerCount }, '*');
      // Tell the new player their index via the channel
      gameChannel.send({ type: 'broadcast', event: 'game_assign', payload: { target: payload.user, playerIndex: session.playerCount - 1, playerCount: session.playerCount, winId } });
    })
    .on('broadcast', { event: 'game_sync' }, ({ payload }) => {
      if (payload.from === S.user) return;
      iframe.contentWindow?.postMessage({ type: 'DC_REMOTE_SYNC', winId, payload: payload.state }, '*');
    })
    .on('broadcast', { event: 'game_input' }, ({ payload }) => {
      if (payload.from === S.user) return;
      iframe.contentWindow?.postMessage({ type: 'DC_REMOTE_INPUT', winId, playerIndex: payload.playerIndex, payload: payload.input }, '*');
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        log(`MULTIPLAYER GAME STARTED: <strong>${esc(title)}</strong> in #${esc(S.currentRoom)} — share with: <span class="hc">--game join ${winId}</span>`, 'ok');
        notify('Game hosted! Share --game join ' + winId, 'ok', 5000);
      }
    });
}

// Join an existing multiplayer game session
function joinMpGame(winId) {
  if (!S.currentRoom) { log('JOIN A ROOM FIRST: --room (name)', 'err'); return; }
  if (!window._sb2) { log('REALTIME NOT READY.', 'err'); return; }

  const gameChannel = window._sb2.channel('game:' + S.currentRoom + ':' + winId);
  let playerIndex = -1;
  let playerCount = 1;
  let iframe = null;

  const session = { channel: gameChannel, isHost: false, playerIndex: -1, playerCount: 1, sync: 'state', players: [] };
  _mpSessions[winId] = session;

  gameChannel
    .on('broadcast', { event: 'game_assign' }, ({ payload }) => {
      if (payload.target !== S.user) return;
      playerIndex = payload.playerIndex;
      playerCount = payload.playerCount;
      session.playerIndex = playerIndex;
      session.playerCount = playerCount;
      log(`ASSIGNED: Player ${playerIndex + 1} of ${playerCount}`, 'sys');
      // Now open window — we need the game HTML from the host
      // Request it
      gameChannel.send({ type: 'broadcast', event: 'game_html_req', payload: { user: S.user } });
    })
    .on('broadcast', { event: 'game_html_res' }, ({ payload }) => {
      if (payload.target !== S.user) return;
      const injected = injectMpBridge(payload.html, winId, false, playerIndex, playerCount, payload.sync || 'state');
      const { body } = mkWin({ title: '◈ ' + (payload.title || 'GAME') + ' [P' + (playerIndex + 1) + ']', w: 960, h: 620, type: 'html' });
      iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000;';
      iframe.srcdoc = injected;
      iframe.sandbox = 'allow-scripts allow-same-origin';
      body.appendChild(iframe);
      session.iframe = iframe;
      log('GAME LOADED. You are <strong>Player ' + (playerIndex + 1) + '</strong>.', 'ok');
    })
    .on('broadcast', { event: 'game_sync' }, ({ payload }) => {
      if (payload.from === S.user || !iframe) return;
      iframe.contentWindow?.postMessage({ type: 'DC_REMOTE_SYNC', winId, payload: payload.state }, '*');
    })
    .on('broadcast', { event: 'game_input' }, ({ payload }) => {
      if (payload.from === S.user || !iframe) return;
      iframe.contentWindow?.postMessage({ type: 'DC_REMOTE_INPUT', winId, playerIndex: payload.playerIndex, payload: payload.input }, '*');
    })
    .on('broadcast', { event: 'game_html_req' }, ({ payload }) => {
      // if we are host, send HTML to requester
      // (handled in launchMpGame session, so look up in _mpSessions)
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        // announce join to host
        gameChannel.send({ type: 'broadcast', event: 'game_join', payload: { user: S.user, winId } });
        log('JOINING GAME: ' + winId + '...', 'sys');
      }
    });
}

// --game command dispatcher
async function handleGameCmd(args) {
  const sub = args[0]?.toLowerCase();

  if (!sub || sub === 'list') {
    // list active mp games in current room
    const active = Object.entries(_mpSessions);
    if (!active.length) { log('NO ACTIVE MULTIPLAYER GAMES. Make one: make multiplayer game (desc)', 'sys'); return; }
    let h = '<div class="hb"><div style="color:var(--accent);font-weight:900;margin-bottom:6px;">── ACTIVE GAMES ──</div>';
    active.forEach(([id, sess]) => {
      h += `<div style="margin:4px 0;"><span style="color:var(--accent)">${esc(id)}</span> <span style="color:#555;">${sess.isHost ? '[HOST]' : '[PLAYER ' + (sess.playerIndex + 1) + ']'} · ${sess.playerCount} players</span></div>`;
    });
    h += '<div style="color:#444;font-size:11px;margin-top:6px;">--game join (id) to join a game</div></div>';
    log(h, 'inf');
    return;
  }

  if (sub === 'join') {
    const id = args[1];
    if (!id) { log('USAGE: --game join (game-id)', 'err'); return; }
    joinMpGame(id);
    return;
  }

  if (sub === 'leave' || sub === 'quit') {
    const id = args[1] || Object.keys(_mpSessions).slice(-1)[0];
    if (!id || !_mpSessions[id]) { log('NO GAME TO LEAVE.', 'sys'); return; }
    _mpSessions[id].channel?.unsubscribe();
    delete _mpSessions[id];
    log('LEFT GAME: ' + id, 'ok');
    return;
  }

  if (sub === 'invite') {
    // --game invite (username) (gameid)
    const target = args[1];
    const id = args[2] || Object.keys(_mpSessions).slice(-1)[0];
    if (!target || !id) { log('USAGE: --game invite (username) (gameid)', 'err'); return; }
    if (!S.currentRoom) { log('JOIN A ROOM FIRST.', 'err'); return; }
    // Send via inbox
    _ensureSB2(() => {
      const ch = window._sb2.channel('inbox:' + target.toLowerCase());
      ch.subscribe(st => {
        if (st === 'SUBSCRIBED') {
          ch.send({ type: 'broadcast', event: 'game_invite', payload: { from: S.user, room: S.currentRoom, winId: id } });
          setTimeout(() => ch.unsubscribe(), 3000);
          log(`GAME INVITE SENT to <span style="color:var(--accent)">${esc(target)}</span>`, 'ok');
        }
      });
    });
    return;
  }

  log('USAGE: --game list | --game join (id) | --game invite (user) (id) | --game leave', 'err');
}

/* BOOT */
const $flash=document.getElementById('boot-flash');
const $bcon =document.getElementById('boot-console');

function crtPrint(line,delay=0){
  return new Promise(res=>setTimeout(()=>{
    const d=document.createElement('div');
    d.style.cssText='opacity:0;transition:opacity .15s;color:#3a3a3a;';
    d.textContent=line;
    $bcon.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.style.opacity='1'));
    $bcon.scrollTop=$bcon.scrollHeight;
    res();
  },delay));
}

async function boot(){
  renderLogo();

  // ── CRT FLASH ──────────────────────────────────
  // Simulate phosphor burst when screen powers on
  await sleep(120);
  $flash.style.transition='opacity .05s';
  $flash.style.opacity='1';
  await sleep(55);
  $flash.style.transition='opacity .18s';
  $flash.style.opacity='0';
  await sleep(80);

  // Flicker the logo in like a CRT warming up
  const $bl=document.getElementById('boot-logo');
  $bl.style.opacity='0.15'; await sleep(60);
  $bl.style.opacity='0';    await sleep(40);
  $bl.style.opacity='0.7';  await sleep(35);
  $bl.style.opacity='0.2';  await sleep(55);
  $bl.style.opacity='1';

  // ── CONSOLE LINES ──────────────────────────────
  const lines=[
    {t:'BIOS v1.0 ........ OK',         d:0  },
    {t:'CPU CORE ......... DETECTED',    d:80 },
    {t:'MEMORY CHECK ..... 65536KB OK',  d:100},
    {t:'STORAGE DRIVER ... MOUNTING',    d:95 },
    {t:'IDB SUBSYSTEM .... INIT',        d:90 },
    {t:'CHROMATIC ENGINE . SYNCING',     d:85 },
    {t:'KERNEL v3.0 ...... LOADING',     d:95 },
    {t:'CLOUD UPLINK ..... TESTING',     d:80 },
  ];

  // Run console lines and storage init in parallel
  const idbPromise = initIDB();
  let charDelay=0;
  for(const l of lines){ await crtPrint(l.t, charDelay); charDelay=l.d; }

  const idbOk = await idbPromise;

  // Progress bar sweep
  const $bar=document.getElementById('boot-bar');
  const $msg=document.getElementById('boot-msg');
  const step=(p,m,t=60)=>{$bar.style.width=p+'%';$msg.textContent=m;return sleep(t);};
  await step(30,'');await step(60,'');await step(85,'');

  // Cloud probe
  $msg.textContent='TESTING CLOUD LINK...';
  const sbOk=await(async()=>{
    try{
      const r=await fetch(`${SB_URL}/storage/v1/object/list/${BUCKET}`,{
        method:'POST',
        headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
        body:JSON.stringify({prefix:'users/',limit:1,offset:0})
      });
      return r.status===200||r.status===400;
    }catch{return false;}
  })();

  await crtPrint(sbOk ? 'SUPABASE ......... CONNECTED' : 'SUPABASE ......... OFFLINE', 60);
  await crtPrint('BOOT COMPLETE.', 80);
  await step(100,'READY.',200);

  // ── FADE OUT BOOT ──────────────────────────────
  $boot.style.opacity='0';
  await sleep(400);
  $boot.style.display='none';

  // ── TERMINAL READY ─────────────────────────────
  log('DREAMCORE TERMINAL v3.0 — OPEN SOURCE AI KERNEL','sys');
  _sbOnline=sbOk;
  if(sbOk)log('STORAGE: <span style="color:var(--ok)">☁ SUPABASE CONNECTED</span> — data syncs across all your devices','sys');
  else if(idbOk)log('STORAGE: <span style="color:#ffaa00">◉ LOCAL ONLY (IndexedDB)</span> — open locally for cloud sync','sys');
  else log('STORAGE: <span style="color:var(--err)">◈ SESSION MEMORY ONLY</span> — download & open locally','sys');
  log('Type <span class="hc">--help</span> for commands &nbsp;·&nbsp; <span class="hc">--usr .(name)</span> to sign in','inf');
  updatePrompt();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
boot();
