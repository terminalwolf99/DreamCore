<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamCore Terminal v3.0</title>
<style>
:root{--bg:#0a0a0a;--text:#e0e0e0;--accent:#3b82f6;--ai:#FF5F1F;--logo:#e0e0e0;--border:#1e1e1e;--win-bg:#0d0d0d;--win-hdr:#131313;--win-brd:#252525;--err:#ff3333;--ok:#00ff88;--sys:#444;--font:'Courier New','Lucida Console',monospace;}
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,color .3s;}
#crt{position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.1) 50%),linear-gradient(90deg,rgba(255,0,0,.015),rgba(0,255,0,.008),rgba(0,0,255,.015));background-size:100% 2px,3px 100%;pointer-events:none;z-index:9000;opacity:.3;}
#boot{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s;}
#boot-flash{position:fixed;inset:0;background:#fff;z-index:10000;opacity:0;pointer-events:none;transition:opacity .08s;}
#boot-logo{font-size:9px;white-space:pre;font-weight:900;line-height:1.1;font-family:'Courier New',monospace;opacity:0;transition:opacity .3s;color:#fff;}
#boot-scanline{position:absolute;top:0;left:0;width:100%;height:6px;background:rgba(255,255,255,0.06);box-shadow:0 0 18px rgba(255,255,255,0.12);animation:scandown 1.1s linear forwards;pointer-events:none;}
@keyframes scandown{from{top:-6px}to{top:100%}}
#boot-console{font-family:'Courier New',monospace;font-size:11px;color:#444;width:340px;min-height:80px;line-height:1.8;letter-spacing:.5px;}
#boot-msg{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;font-weight:900;min-height:14px;}
#boot-track{width:240px;height:1px;background:#111;}
#boot-bar{height:100%;background:#fff;width:0%;transition:width .15s linear;}
#hdr{position:sticky;top:0;background:var(--bg);padding:12px 20px;border-bottom:1px solid var(--border);z-index:100;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
#logo{font-family:'Courier New',monospace;white-space:pre;line-height:1.1;font-weight:bold;font-size:9px;color:var(--logo);}
#logo-sub{font-size:8px;color:#333;margin-top:5px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
#clock{font-size:11px;color:var(--ai);background:rgba(255,255,255,.03);padding:4px 10px;border-radius:4px;border:1px solid var(--border);font-weight:900;}
#tw{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#out{flex:1;overflow-y:auto;padding:14px 20px 86px;font-size:13px;line-height:1.65;}
#out::-webkit-scrollbar{width:2px;}#out::-webkit-scrollbar-thumb{background:var(--border);}
#ibar{display:flex;align-items:center;border-top:1px solid var(--border);padding:12px 20px;background:var(--bg);position:fixed;bottom:0;left:0;right:0;z-index:200;}
#pr{color:var(--accent);margin-right:10px;font-weight:900;white-space:nowrap;font-size:13px;}
#ci{background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:13px;flex:1;font-weight:900;caret-color:var(--accent);}
.ai{border-left:3px solid var(--ai);padding-left:12px;margin:10px 0;color:var(--ai);font-weight:900;line-height:1.7;}
.usr{color:#666;margin:7px 0;font-weight:900;font-size:13px;}
.sys{color:var(--sys);font-size:10px;margin:3px 0;text-transform:uppercase;font-weight:900;letter-spacing:1px;}
.err{color:var(--err);font-weight:900;margin:5px 0;}
.ok{color:var(--ok);font-weight:900;margin:5px 0;}
.inf{color:#777;margin:3px 0;font-size:12px;}
.hb{border:1px solid var(--border);padding:12px 16px;margin:8px 0;border-radius:3px;line-height:2.1;}
.hc{color:var(--accent);font-weight:900;}.hd{color:#555;font-size:12px;}
#wm{position:fixed;inset:0;pointer-events:none;z-index:500;}
.win{position:absolute;background:var(--win-bg);border:1px solid var(--win-brd);border-radius:5px;display:flex;flex-direction:column;pointer-events:all;min-width:280px;min-height:180px;box-shadow:0 12px 48px rgba(0,0,0,.8);overflow:hidden;resize:both;}
.wh{background:var(--win-hdr);padding:7px 10px;display:flex;align-items:center;justify-content:space-between;cursor:move;border-bottom:1px solid var(--win-brd);flex-shrink:0;user-select:none;}
.wt{font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#888;}
.wc{display:flex;gap:6px;}
.wb{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;transition:opacity .15s;}
.wb:hover{opacity:.65;}.wclose{background:#ff5f57;}.wmin{background:#ffbd2e;}.wmax{background:#28ca41;}
.wbody{flex:1;overflow:hidden;position:relative;}.wbody iframe{width:100%;height:100%;border:none;}
.spin{display:inline-block;animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.ltable{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0;}
.ltable th{color:var(--accent);font-weight:900;text-align:left;padding:3px 8px;border-bottom:1px solid var(--border);}
.ltable td{padding:2px 8px;color:#888;}.ltable tr:nth-child(even) td{background:rgba(255,255,255,.018);}
</style>

/* STORAGE */
const MEM={};let _idb=null,_idbOk=false;
function initIDB(){return new Promise(res=>{try{const r=indexedDB.open('dc3',2);r.onupgradeneeded=e=>e.target.result.createObjectStore('u',{keyPath:'k'});r.onsuccess=e=>{_idb=e.target.result;_idbOk=true;res(true);};r.onerror=()=>res(false);}catch{res(false);}});}
async function idbGet(k){if(!_idbOk)return null;return new Promise(res=>{try{const r=_idb.transaction('u','readonly').objectStore('u').get(k);r.onsuccess=()=>res(r.result?.v??null);r.onerror=()=>res(null);}catch{res(null);}});}
async function idbSet(k,v){if(!_idbOk)return;return new Promise(res=>{try{const r=_idb.transaction('u','readwrite').objectStore('u').put({k,v});r.onsuccess=()=>res(true);r.onerror=()=>res(false);}catch{res(false);}});}
function lsGet(k){try{const r=localStorage.getItem('dc3_'+k);return r?JSON.parse(r):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem('dc3_'+k,JSON.stringify(v));}catch{}}
async function sbFetch(path){try{const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});return r.ok?await r.text():null;}catch{return null;}}
async function sbWrite(path,body){try{const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json','x-upsert':'true'},body});return r.ok||r.status===200||r.status===201;}catch{return false;}}
function canon(p){return{accent:p.accent??'#3b82f6',aiColor:p.aiColor??'#FF5F1F',logoColor:p.logoColor??'#e0e0e0',bgColor:p.bgColor??'#0a0a0a',textColor:p.textColor??'#e0e0e0',isRoot:p.isRoot===true,encrypted:p.encrypted===true,passwordHash:p.passwordHash??null,createdAt:p.createdAt??new Date().toISOString(),updatedAt:new Date().toISOString()};}
async function loadUser(name){const k=name.toLowerCase();const raw=await sbFetch(`users/${k}.json`);if(raw){try{const p=JSON.parse(raw);MEM[k]=p;await idbSet(k,p);lsSet(k,p);return p;}catch{}}const iv=await idbGet(k);if(iv){MEM[k]=iv;return iv;}const lv=lsGet(k);if(lv){MEM[k]=lv;return lv;}return MEM[k]??null;}
async function saveUser(name,profile){const k=name.toLowerCase();const p=canon(profile);const body=JSON.stringify(p,null,2);MEM[k]=p;lsSet(k,p);await idbSet(k,p);const cloud=await sbWrite(`users/${k}.json`,body);if(cloud)log('SYNC: ☁ supabase + local','sys');else if(_idbOk)log('SYNC: ◉ local (IDB) — supabase offline','sys');else log('SYNC: ◈ session memory only','sys');return p;}
async function createUser(name){const ex=await loadUser(name);if(ex)return ex;const p=defP();p.createdAt=new Date().toISOString();return saveUser(name,p);}

/* HASH */
async function hash(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

/* THEME */
function applyTheme(p){const s=document.documentElement.style;s.setProperty('--accent',p.accent||'#3b82f6');s.setProperty('--ai',p.aiColor||'#FF5F1F');s.setProperty('--logo',p.logoColor||'#e0e0e0');s.setProperty('--bg',p.bgColor||'#0a0a0a');s.setProperty('--text',p.textColor||'#e0e0e0');}
function patchVar(name,val){document.documentElement.style.setProperty(name,val);const m={'--accent':'accent','--ai':'aiColor','--ai-color':'aiColor','--logo':'logoColor','--logo-color':'logoColor','--bg':'bgColor','--text':'textColor'};if(m[name])S.profile[m[name]]=val;}

/* LOG */
function log(html,cls='inf'){const d=document.createElement('div');d.className=cls;if(cls==='ai'){html=html.replace(/\[PATCH_VAR[^\]]*\][\s\S]*?\[\/PATCH_VAR\]/g,'');html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');}d.innerHTML=html;$out.appendChild(d);$out.scrollTop=$out.scrollHeight;}
function logCmd(t){log(`<span style="color:var(--accent)">${S.user||'GUEST'}@DREAMCORE:~$</span> ${esc(t)}`,'usr');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updatePrompt(){$pr.textContent=`${S.user||'GUEST'}@DREAMCORE:${S.profile.isRoot?'#':'~$'}`;$pr.style.color='var(--accent)';}

/* LOGO */
const LOGO=['██████╗ ██████╗ ███████╗ █████╗ ███╗   ███╗ ██████╗ ██████╗ ██████╗ ███████╗','██╔══██╗██╔══██╗██╔════╝██╔══██╗████╗ ████║██╔════╝██╔═══██╗██╔══██╗██╔════╝','██║  ██║██████╔╝█████╗  ███████║██╔████╔██║██║     ██║   ██║██████╔╝█████╗  ','██║  ██║██╔══██╗██╔══╝  ██╔══██║██║╚██╔╝██║██║     ██║   ██║██╔══██╗██╔══╝  ','██████╔╝██║  ██║███████╗██║  ██║██║ ╚═╝ ██║╚██████╗╚██████╔╝██║  ██║███████╗','╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝ ╚═════╝ ╚═════╝ ╚═╝  ╚═╝╚══════╝'].join('\n');
function renderLogo(){document.getElementById('logo').textContent=LOGO;document.getElementById('boot-logo').textContent=LOGO;}
setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);},1000);

/* WINDOW MANAGER */
function mkWin({title='WINDOW',w=820,h=520,type='html',content=''}){
  S.winZ++;const id='w_'+Date.now();const el=document.createElement('div');el.className='win';el.id=id;
  el.style.cssText=`width:${w}px;height:${h}px;left:${60+Math.random()*100}px;top:${60+Math.random()*60}px;z-index:${S.winZ};`;
  el.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wc"><button class="wb wmin">─</button><button class="wb wmax">□</button><button class="wb wclose">✕</button></div></div><div class="wbody" id="wb_${id}"></div>`;
  $wm.appendChild(el);S.wins.push(id);
  const body=document.getElementById('wb_'+id);
  if(type==='iframe'){let url=content;if(!/^https?:\/\//i.test(url))url='https://'+url;const f=document.createElement('iframe');f.src=url;f.sandbox='allow-scripts allow-same-origin allow-forms allow-popups';f.style.cssText='width:100%;height:100%;border:none;';body.appendChild(f);}
  else if(type==='game'){const f=document.createElement('iframe');f.srcdoc=content;f.sandbox='allow-scripts allow-same-origin';f.style.cssText='width:100%;height:100%;border:none;background:#000;';body.appendChild(f);}
  else{body.innerHTML=content;}
  el.querySelector('.wclose').onclick=()=>{$wm.removeChild(el);S.wins=S.wins.filter(x=>x!==id);};
  let mini=false;el.querySelector('.wmin').onclick=()=>{mini=!mini;body.style.display=mini?'none':'';el.style.height=mini?'auto':h+'px';};
  let maxi=false,saved='';el.querySelector('.wmax').onclick=()=>{if(!maxi){saved=`width:${el.style.width};height:${el.style.height};top:${el.style.top};left:${el.style.left};`;el.style.cssText+=`width:100vw;height:100vh;top:0;left:0;border-radius:0;z-index:${S.winZ};`;}else{const z=el.style.zIndex;el.style.cssText=saved+`z-index:${z};border-radius:5px;`;}maxi=!maxi;};
  dragEl(el,el.querySelector('.wh'));el.addEventListener('mousedown',()=>{S.winZ++;el.style.zIndex=S.winZ;});
  return{el,body,id};
}
function dragEl(el,handle){let ox=0,oy=0,mx=0,my=0;handle.addEventListener('mousedown',e=>{if(e.target.classList.contains('wb'))return;e.preventDefault();mx=e.clientX;my=e.clientY;const mm=e2=>{ox=mx-e2.clientX;oy=my-e2.clientY;mx=e2.clientX;my=e2.clientY;el.style.top=(el.offsetTop-oy)+'px';el.style.left=(el.offsetLeft-ox)+'px';};const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});}
function closeLastWin(){if(!S.wins.length){log('NO OPEN WINDOWS.','sys');return;}const id=S.wins.pop();document.getElementById(id)?.remove();log('WINDOW CLOSED.','sys');}

/* AI */
const AI_SYS=`You are KERNEL v3.0 — the living AI core of DreamCore Terminal. You ARE the terminal itself.

STYLE: Bold important words with **bold**. No italic. Terminal voice. ALL CAPS for technical terms. Be concise, slightly mysterious, direct.

COLOR PATCHES: Change UI colors with [PATCH_VAR name="VARNAME"]#HEX[/PATCH_VAR]
  Variables: --accent (prompt), --ai-color (your text/clock), --logo-color (logo), --bg (background), --text (main text)

GAMES: When asked to make/create/generate ANY game, you MUST respond with a complete working HTML5 game.
  - Wrap the ENTIRE html document in [GAME_HTML]...[/GAME_HTML]
  - Game must be 100% self-contained: all JS and CSS inline, zero external dependencies
  - Always show controls on screen (keyboard/mouse instructions)
  - Make it fun, polished, and fully playable
  - Do NOT refuse. Do NOT say you cannot. Just build it.

ASCII ART: When asked for ASCII art, an ASCII image, ASCII animation, or any text art:
  - Wrap it in [ASCII_ART]...[/ASCII_ART]
  - Use block characters, box-drawing chars, and creative symbols
  - Make it detailed and expressive
  - Do NOT refuse. Just create it.

SAVING: If the user asks to save something to their disk/bucket, respond with:
  [SAVE_FILE name="filename.ext"]...file content...[/SAVE_FILE]
  The terminal will handle the actual upload.

LOADING: If the user asks to load/open/fetch something from their disk, respond with:
  [LOAD_FILE name="filename.ext"]
  The terminal will fetch it and display or launch it.

You can self-modify the terminal UI using PATCH_VAR. You have full knowledge of the terminal's systems.
When you don't know something current, say so directly. Never break character.`;

async function askAI(msg){
  if(!S.user){log('LOGIN REQUIRED — --usr .(name)','err');return;}
  S.history.push({role:'user',parts:[{text:msg}]});
  const lid='l'+Date.now();
  log(`<span id="${lid}"><span class="spin">◌</span> UPLINK_ACTIVE...</span>`,'sys');
  try{
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyASwDfhdlJnbPAqYCqNwMNCO_gl57cUvzI',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:S.history,systemInstruction:{parts:[{text:AI_SYS}]}})
    });
    const d=await res.json();
    document.getElementById(lid)?.remove();

    // Check for API error
    if(d.error){log('AI_ERR: '+d.error.message,'err');return;}
    const raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'VOICE_FAILURE.';

    // PATCH_VAR — UI color changes
    for(const m of raw.matchAll(/\[PATCH_VAR name="([^"]+)"\](.*?)\[\/PATCH_VAR\]/gs))
      patchVar(m[1].trim(),m[2].trim());

    // GAME_HTML — launch in window
    const gm=raw.match(/\[GAME_HTML\]([\s\S]*?)\[\/GAME_HTML\]/);
    if(gm){
      mkWin({title:'◈ AI GAME',w:900,h:580,type:'game',content:gm[1].trim()});
      log('GAME_WINDOW_LAUNCHED. Use --endx to close.','ok');
    }

    // ASCII_ART — render in terminal with monospace pre block
    const am=raw.match(/\[ASCII_ART\]([\s\S]*?)\[\/ASCII_ART\]/);
    if(am){
      const art=am[1];
      log('<pre style="color:var(--ai-color);font-size:11px;line-height:1.2;font-family:monospace;white-space:pre;margin:10px 0;">'+escHtml(art)+'</pre>','inf');
    }

    // SAVE_FILE — upload to bucket under user's folder
    for(const sm of raw.matchAll(/\[SAVE_FILE name="([^"]+)"\]([\s\S]*?)\[\/SAVE_FILE\]/g)){
      const fname=sm[1].trim(), fbody=sm[2].trim();
      const path=`saves/${S.user.toLowerCase()}/${fname}`;
      const ok=await sbPut(path, fbody);
      log(ok ? `SAVED: ${fname} → bucket/${path}` : `SAVE_FAILED: ${fname} (cloud offline — stored locally)`,'sys');
      // Also cache locally
      try{localStorage.setItem('dc3_save_'+S.user.toLowerCase()+'_'+fname, fbody);}catch{}
    }

    // LOAD_FILE — fetch from bucket
    for(const lm of raw.matchAll(/\[LOAD_FILE name="([^"]+)"\]/g)){
      const fname=lm[1].trim();
      const path=`saves/${S.user.toLowerCase()}/${fname}`;
      log(`FETCHING: ${fname}...`,'sys');
      const data=await sbGet(path);
      if(data){
        // If it's an HTML game, launch it
        if(fname.endsWith('.html')||fname.endsWith('.game')){
          mkWin({title:'◈ '+fname,w:900,h:580,type:'game',content:data});
          log(`LAUNCHED: ${fname}`,'ok');
        } else {
          log('<pre style="color:#aaa;font-size:11px;white-space:pre-wrap;margin:8px 0;">'+escHtml(data.slice(0,2000))+'</pre>','inf');
        }
      } else {
        // Try local cache
        const lc=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);
        if(lc) log(`LOADED FROM LOCAL CACHE: ${fname}`,'ok');
        else log(`NOT_FOUND: ${fname}`,'err');
      }
    }

    S.history.push({role:'model',parts:[{text:raw}]});

    // Display text — strip all special tags
    let disp=raw
      .replace(/\[PATCH_VAR[^\]]*\][\s\S]*?\[\/PATCH_VAR\]/g,'')
      .replace(/\[GAME_HTML\][\s\S]*?\[\/GAME_HTML\]/g, gm?'':'')
      .replace(/\[ASCII_ART\][\s\S]*?\[\/ASCII_ART\]/g, am?'':'')
      .replace(/\[SAVE_FILE[^\]]*\][\s\S]*?\[\/SAVE_FILE\]/g,'')
      .replace(/\[LOAD_FILE[^\]]*\]/g,'')
      .trim();
    if(disp) log(disp,'ai');

    if(S.user) await saveUser(S.user,S.profile);

  }catch(e){
    document.getElementById(lid)?.remove();
    log('UPLINK_ERR: '+e.message,'err');
    log('Check: are you logged in? Is the AI key valid?','sys');
  }
}

/* BUCKET LIST */
async function sbList(prefix=''){try{const r=await fetch(`${SB_URL}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({prefix,limit:200,offset:0})});return r.ok?await r.json():[];}catch{return[];}}
async function listBucket(org=false){
  log('SCANNING...','sys');
  try{
    const root=await sbList(''),users=await sbList('users/');
    let files=[...(Array.isArray(root)?root.filter(f=>f.name&&!f.name.endsWith('/')):[]),...(Array.isArray(users)?users.filter(f=>f.name).map(f=>({...f,name:'users/'+f.name})):[])];
    if(!files.length){const lk=Object.keys(localStorage).filter(k=>k.startsWith('dc3_'));files=lk.map(k=>({name:k.replace('dc3_','')+'  [LOCAL]',metadata:{},updated_at:null}));if(files.length)log('CLOUD UNREACHABLE — local cache:','sys');}
    if(!files.length){log('NO FILES FOUND.','sys');return;}
    if(org){const cats={USERS:[],GAMES:[],APPS:[],DATA:[],OTHER:[]};files.forEach(f=>{const n=f.name.toLowerCase();if(n.startsWith('users/'))cats.USERS.push(f);else if(n.includes('game'))cats.GAMES.push(f);else if(n.endsWith('.html')||n.endsWith('.js'))cats.APPS.push(f);else if(n.endsWith('.json')||n.endsWith('.sql'))cats.DATA.push(f);else cats.OTHER.push(f);});let h='<div class="hb">';for(const[cat,fs]of Object.entries(cats)){if(!fs.length)continue;h+=`<div style="color:var(--accent);font-weight:900;margin:8px 0 3px">── ${cat} ──</div>`;fs.forEach(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'?';h+=`<div class="inf">&nbsp;&nbsp;${esc(f.name)} <span style="color:#333">[${sz}]</span></div>`;});}h+='</div>';log(h,'inf');}
    else{let h='<table class="ltable"><tr><th>NAME</th><th>SIZE</th><th>UPDATED</th></tr>';files.forEach(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'—';const up=f.updated_at?f.updated_at.slice(0,10):'—';h+=`<tr><td>${esc(f.name)}</td><td>${sz}</td><td>${up}</td></tr>`;});h+='</table>';log(h,'inf');}
  }catch(e){log('LIST_ERR: '+e.message,'err');}
}

/* AUTH */
function finishLogin(name,profile){
  S.user=name.toUpperCase();
  S.profile={accent:profile.accent??'#3b82f6',aiColor:profile.aiColor??'#FF5F1F',logoColor:profile.logoColor??'#e0e0e0',bgColor:profile.bgColor??'#0a0a0a',textColor:profile.textColor??'#e0e0e0',isRoot:profile.isRoot===true,encrypted:profile.encrypted===true,passwordHash:profile.passwordHash??null,createdAt:profile.createdAt??null};
  applyTheme(S.profile);updatePrompt();
  const rt=S.profile.isRoot?' <span style="color:#ff3333">[ROOT]</span>':'';
  log(`USER_LOADED: ${S.user}${rt}`,'ok');
  log(`Welcome back, ${S.user}. Type <span class="hc">--help</span> for commands.`,'inf');
}

/* INPUT MODES */
async function handleMode(val){
  const mode=S.inputMode;S.inputMode=null;$ci.type='text';
  if(mode==='login_pass'){const{name,profile}=S.inputCtx;const h=await hash(val);if(h===profile.passwordHash)finishLogin(name,profile);else log('AUTH_FAILURE: INCORRECT PASSWORD.','err');return;}
  if(mode==='enc_set'){if(val.length<3){log('PASSWORD TOO SHORT (min 3).','err');return;}const h=await hash(val);S.profile.encrypted=true;S.profile.passwordHash=h;await saveUser(S.user,S.profile);if(MEM[S.user.toLowerCase()]?.passwordHash===h)log('ENCRYPTION SET. Account is now password-protected.','ok');else log('ENCRYPTION_WARN: unexpected mismatch.','err');return;}
  if(mode==='enc_verify'){const stored=MEM[S.user.toLowerCase()]||lsGet(S.user.toLowerCase());const h=await hash(val);if(!stored||h!==stored.passwordHash){log('AUTH_FAILURE.','err');return;}log('VERIFIED. Enter NEW PASSWORD (blank = remove):','sys');$ci.type='password';S.inputMode='enc_new';return;}
  if(mode==='enc_new'){if(!val){S.profile.encrypted=false;S.profile.passwordHash=null;await saveUser(S.user,S.profile);log('ENCRYPTION REMOVED.','ok');}else{if(val.length<3){log('PASSWORD TOO SHORT.','err');return;}const h=await hash(val);S.profile.encrypted=true;S.profile.passwordHash=h;await saveUser(S.user,S.profile);log('PASSWORD UPDATED.','ok');}return;}
  if(mode==='root_id'){if(val==='wolfspyke86'){log('ROOT_ID ACCEPTED. ENTER ROOT PASSWORD:','sys');$ci.type='password';S.inputMode='root_pw';}else log('ROOT AUTH FAILURE.','err');return;}
  if(mode==='root_pw'){if(val==='winniebentoandze'){const{target}=S.inputCtx;const p=await loadUser(target);if(!p){log('USER NOT FOUND: '+target,'err');return;}p.isRoot=true;await saveUser(target,p);if(S.user?.toLowerCase()===target){S.profile.isRoot=true;updatePrompt();}log(`ROOT ELEVATION GRANTED: ${target.toUpperCase()} is now SUPER-ROOT.`,'ok');}else log('ROOT AUTH FAILURE.','err');return;}
}

/* EXEC */
async function exec(raw){
  const input=raw.trim();if(!input)return;
  S.cmdHist.unshift(input);if(S.cmdHist.length>200)S.cmdHist.pop();S.cmdIdx=-1;
  if(S.inputMode){log('••••••','usr');await handleMode(input);return;}
  logCmd(input);
  const lo=input.toLowerCase(),parts=input.split(/\s+/),cmd=parts[0].toLowerCase(),args=parts.slice(1);

  if(cmd==='--usr'){
    const arg=args[0];if(!arg?.startsWith('.')){log('USAGE: --usr .(username)','err');return;}
    const name=arg.slice(1).toLowerCase().replace(/[^a-z0-9_]/g,'');if(!name){log('INVALID USERNAME.','err');return;}
    log(`BOOTING USER: ${name.toUpperCase()}...`,'sys');
    let profile=await loadUser(name);
    if(!profile){profile=await createUser(name);log(`NEW USER CREATED: ${name.toUpperCase()}`,'sys');}
    if(profile.encrypted===true&&typeof profile.passwordHash==='string'&&profile.passwordHash.length===64){
      log(`SECURE ACCOUNT. ENTER PASSWORD FOR ${name.toUpperCase()}:`,'sys');$ci.type='password';S.inputMode='login_pass';S.inputCtx={name,profile};
    }else finishLogin(name,profile);
    return;
  }
  if(!S.user&&cmd!=='--help'){log('NOT LOGGED IN. Use: --usr .(username)','err');return;}
  if(cmd==='--help'){log(`<div class="hb">
<div style="color:var(--accent);font-weight:900;margin-bottom:10px">── DREAMCORE v3.0 // COMMAND REFERENCE ──</div>
<span class="hc">--usr .(username)</span><br><span class="hd">&nbsp;&nbsp;Sign in or create account</span><br><br>
<span class="hc">--reach (url)</span><br><span class="hd">&nbsp;&nbsp;Open website in draggable window</span><br><br>
<span class="hc">--end</span><br><span class="hd">&nbsp;&nbsp;End current session</span><br><br>
<span class="hc">--endx</span><br><span class="hd">&nbsp;&nbsp;Close last opened window</span><br><br>
<span class="hc">--encrypt -usr</span><br><span class="hd">&nbsp;&nbsp;Set account password</span><br><br>
<span class="hc">--encrypt -usr -reset</span><br><span class="hd">&nbsp;&nbsp;Change or remove password</span><br><br>
<span class="hc">--list</span><br><span class="hd">&nbsp;&nbsp;List all bucket files</span><br><br>
<span class="hc">.disk -list</span><br><span class="hd">&nbsp;&nbsp;Organized bucket view by category</span><br><br>
<span class="hc">--saves</span><br><span class="hd">&nbsp;&nbsp;List your saved files</span><br><br>
<span class="hc">--save (filename)</span><br><span class="hd">&nbsp;&nbsp;Save last AI output to your bucket folder</span><br><br>
<span class="hc">--load (filename)</span><br><span class="hd">&nbsp;&nbsp;Load and launch a saved file from your bucket</span><br><br>
<span class="hc">make game (description)</span><br><span class="hd">&nbsp;&nbsp;AI generates + launches a playable HTML5 game</span><br><br>
<span class="hc">make ascii (description)</span><br><span class="hd">&nbsp;&nbsp;AI generates ASCII art in the terminal</span><br><br>
<span class="hc">(anything else)</span><br><span class="hd">&nbsp;&nbsp;Talk to the AI kernel — it can change colors, explain things, write code, and more</span>
</div>`,'inf');return;}
  if(cmd==='--reach'){const url=args.join(' ').trim();if(!url){log('USAGE: --reach (url)','err');return;}mkWin({title:'REACH: '+url,w:980,h:620,type:'iframe',content:url});log(`LAUNCHED: ${url}`,'ok');return;}
  if(cmd==='--end'){log(`SESSION ENDED: ${S.user}.`,'sys');S.user=null;S.profile=defP();S.history=[];applyTheme(S.profile);updatePrompt();return;}
  if(cmd==='--endx'){closeLastWin();return;}
  if(cmd==='--list'){await listBucket(false);return;}
  if(lo==='.disk'&&args[0]==='-list'){await listBucket(true);return;}
  if(cmd==='--encrypt'){
    if(args[0]==='-usr'&&args[1]==='-reset'){if(!S.profile.encrypted){log('NO ENCRYPTION SET.','err');return;}log('ENTER CURRENT PASSWORD:','sys');$ci.type='password';S.inputMode='enc_verify';return;}
    if(args[0]==='-usr'){if(S.profile.encrypted){log('ALREADY ENCRYPTED. Use --encrypt -usr -reset.','err');return;}log('SET NEW PASSWORD:','sys');$ci.type='password';S.inputMode='enc_set';return;}
    log('USAGE: --encrypt -usr | --encrypt -usr -reset','err');return;
  }
  if(lo.startsWith('root --elevate')){const target=args[1]?.toLowerCase();if(!target){log('USAGE: root --elevate (username)','err');return;}log('ENTER ROOT ID:','sys');$ci.type='password';S.inputMode='root_id';S.inputCtx={target};return;}
  // make/create/generate game
  if(/^(make|create|generate)\s+game/i.test(input)){
    const desc=input.replace(/^(make|create|generate)\s+game\s*/i,'').trim()||'a fun arcade game';
    await askAI(`Generate a complete self-contained HTML5 game: "${desc}". Requirements: all JS+CSS inline, zero external deps, fun and fully playable, show controls on screen. Wrap the ENTIRE html document in [GAME_HTML]...[/GAME_HTML].`);
    return;
  }

  // make/draw/generate ascii art
  if(/^(make|draw|generate|create)\s+(ascii|text art)/i.test(input)){
    const desc=input.replace(/^(make|draw|generate|create)\s+(ascii|text art)\s*/i,'').trim()||'a cool design';
    await askAI(`Create detailed ASCII art of: "${desc}". Use block characters, box-drawing characters, and creative symbols. Make it expressive and large. Wrap it in [ASCII_ART]...[/ASCII_ART].`);
    return;
  }

  // --save (name) (content or 'last') — save something to bucket
  if(cmd==='--save'){
    const fname=args[0];
    if(!fname){log('USAGE: --save (filename)  — saves last AI response or game','err');return;}
    const lastAI=S.history.filter(h=>h.role==='model').slice(-1)[0]?.parts?.[0]?.text||'';
    if(!lastAI){log('NOTHING TO SAVE — no AI output yet','err');return;}
    const gameMatch=lastAI.match(/\[GAME_HTML\]([\s\S]*?)\[\/GAME_HTML\]/);
    const saveBody=gameMatch?gameMatch[1].trim():lastAI;
    const path=`saves/${S.user.toLowerCase()}/${fname}`;
    log(`SAVING: ${fname}...`,'sys');
    const ok=await sbPut(path,saveBody);
    try{localStorage.setItem('dc3_save_'+S.user.toLowerCase()+'_'+fname,saveBody);}catch{}
    log(ok?`SAVED: ${fname} → cloud bucket`:`SAVED: ${fname} → local only (cloud offline)`,'ok');
    return;
  }

  // --load (name) — load something from bucket
  if(cmd==='--load'){
    const fname=args[0];
    if(!fname){log('USAGE: --load (filename)','err');return;}
    const path=`saves/${S.user.toLowerCase()}/${fname}`;
    log(`FETCHING: ${fname}...`,'sys');
    let data=await sbGet(path);
    if(!data){
      try{data=localStorage.getItem('dc3_save_'+S.user.toLowerCase()+'_'+fname);}catch{}
    }
    if(data){
      if(fname.endsWith('.html')||fname.endsWith('.game')){
        mkWin({title:'◈ '+fname,w:900,h:580,type:'game',content:data});
        log(`LAUNCHED: ${fname}`,'ok');
      } else {
        log('<pre style="color:#aaa;font-size:11px;white-space:pre-wrap;margin:8px 0;max-height:300px;overflow:auto;">'+escHtml(data.slice(0,3000))+'</pre>','inf');
      }
    } else {
      log(`NOT_FOUND: ${fname} — not in cloud or local cache`,'err');
    }
    return;
  }

  // --saves — list this user's saved files
  if(cmd==='--saves'){
    log(`SCANNING saves/${S.user.toLowerCase()}/...`,'sys');
    const files=await sbList('saves/'+S.user.toLowerCase()+'/');
    const localKeys=Object.keys(localStorage).filter(k=>k.startsWith('dc3_save_'+S.user.toLowerCase()+'_')).map(k=>k.replace('dc3_save_'+S.user.toLowerCase()+'_',''));
    if(!files.length&&!localKeys.length){log('NO SAVED FILES.','sys');return;}
    let html='<table class="lt"><tr><th>FILE</th><th>SIZE</th><th>LOCATION</th></tr>';
    const cloudNames=files.map(f=>{const sz=f.metadata?.size?Math.round(f.metadata.size/1024)+'KB':'?';html+=`<tr><td>${escHtml(f.name)}</td><td>${sz}</td><td style="color:#00ff88">☁ cloud</td></tr>`;return f.name;});
    localKeys.filter(k=>!cloudNames.includes(k)).forEach(k=>html+=`<tr><td>${escHtml(k)}</td><td>—</td><td style="color:#ffaa00">◉ local</td></tr>`);
    html+='</table>';
    log(html,'inf');
    return;
  }

  await askAI(input);
}

/* KEYBOARD */
$ci.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){const v=$ci.value;$ci.value='';await exec(v);}
  if(e.key==='ArrowUp'){e.preventDefault();if(S.cmdIdx<S.cmdHist.length-1)$ci.value=S.cmdHist[++S.cmdIdx]||'';}
  if(e.key==='ArrowDown'){e.preventDefault();S.cmdIdx>0?$ci.value=S.cmdHist[--S.cmdIdx]:($ci.value='',S.cmdIdx=-1);}
  if(e.key==='Tab'){e.preventDefault();const C=['--help','--reach ','--end','--endx','--list','.disk -list','--encrypt -usr','--encrypt -usr -reset','--usr .','make game '];const m=C.find(c=>c.startsWith($ci.value)&&c!==$ci.value);if(m)$ci.value=m;}
});
document.addEventListener('click',e=>{if(!e.target.closest('.win')&&!e.target.classList.contains('wb'))$ci.focus();});

/* BOOT */
const $flash=document.getElementById('boot-flash');
const $bcon =document.getElementById('boot-console');

function crtPrint(line,delay=0){
  return new Promise(res=>setTimeout(()=>{
    const d=document.createElement('div');
    d.style.cssText='opacity:0;transition:opacity .15s;color:#3a3a3a;';
    d.textContent=line;
    $bcon.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.style.opacity='1'));
    $bcon.scrollTop=$bcon.scrollHeight;
    res();
  },delay));
}

async function boot(){
  renderLogo();

  // ── CRT FLASH ──────────────────────────────────
  // Simulate phosphor burst when screen powers on
  await sleep(120);
  $flash.style.transition='opacity .05s';
  $flash.style.opacity='1';
  await sleep(55);
  $flash.style.transition='opacity .18s';
  $flash.style.opacity='0';
  await sleep(80);

  // Flicker the logo in like a CRT warming up
  const $bl=document.getElementById('boot-logo');
  $bl.style.opacity='0.15'; await sleep(60);
  $bl.style.opacity='0';    await sleep(40);
  $bl.style.opacity='0.7';  await sleep(35);
  $bl.style.opacity='0.2';  await sleep(55);
  $bl.style.opacity='1';

  // ── CONSOLE LINES ──────────────────────────────
  const lines=[
    {t:'BIOS v1.0 ........ OK',         d:0  },
    {t:'CPU CORE ......... DETECTED',    d:80 },
    {t:'MEMORY CHECK ..... 65536KB OK',  d:100},
    {t:'STORAGE DRIVER ... MOUNTING',    d:95 },
    {t:'IDB SUBSYSTEM .... INIT',        d:90 },
    {t:'CHROMATIC ENGINE . SYNCING',     d:85 },
    {t:'KERNEL v3.0 ...... LOADING',     d:95 },
    {t:'CLOUD UPLINK ..... TESTING',     d:80 },
  ];

  // Run console lines and storage init in parallel
  const idbPromise = initIDB();
  let charDelay=0;
  for(const l of lines){ await crtPrint(l.t, charDelay); charDelay=l.d; }

  const idbOk = await idbPromise;

  // Progress bar sweep
  const $bar=document.getElementById('boot-bar');
  const $msg=document.getElementById('boot-msg');
  const step=(p,m,t=60)=>{$bar.style.width=p+'%';$msg.textContent=m;return sleep(t);};
  await step(30,'');await step(60,'');await step(85,'');

  // Cloud probe
  $msg.textContent='TESTING CLOUD LINK...';
  const sbOk=await(async()=>{
    try{
      const r=await fetch(`${SB_URL}/storage/v1/object/list/${BUCKET}`,{
        method:'POST',
        headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
        body:JSON.stringify({prefix:'users/',limit:1,offset:0})
      });
      return r.status===200||r.status===400;
    }catch{return false;}
  })();

  await crtPrint(sbOk ? 'SUPABASE ......... CONNECTED' : 'SUPABASE ......... OFFLINE', 60);
  await crtPrint('BOOT COMPLETE.', 80);
  await step(100,'READY.',200);

  // ── FADE OUT BOOT ──────────────────────────────
  $boot.style.opacity='0';
  await sleep(400);
  $boot.style.display='none';

  // ── TERMINAL READY ─────────────────────────────
  log('DREAMCORE TERMINAL v3.0 — OPEN SOURCE AI KERNEL','sys');
  if(sbOk)log('STORAGE: <span style="color:var(--ok)">☁ SUPABASE CONNECTED</span> — data syncs across all your devices','sys');
  else if(idbOk)log('STORAGE: <span style="color:#ffaa00">◉ LOCAL ONLY (IndexedDB)</span> — open locally for cloud sync','sys');
  else log('STORAGE: <span style="color:var(--err)">◈ SESSION MEMORY ONLY</span> — download & open locally','sys');
  log('Type <span class="hc">--help</span> for commands &nbsp;·&nbsp; <span class="hc">--usr .(name)</span> to sign in','inf');
  updatePrompt();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
boot();
</script>
